<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>レポート出力</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    .content { padding: 16px; max-width: 680px; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
    .section-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
    select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; background: var(--bg); color: var(--text-primary); outline: none;
    }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-preview { background: var(--toggle-off); color: var(--text-primary); }
    .btn-pdf { background: var(--accent); color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn:active:not(:disabled) { opacity: 0.8; }
    .preview-card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .preview-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); padding: 10px 14px; border-bottom: 1px solid var(--border); }
    iframe { width: 100%; border: none; display: block; background: #fff; transition: height 0.3s; }
    .expand-btn {
      display: inline-block; padding: 4px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--accent); font-size: 12px; cursor: pointer; margin-left: 8px;
    }
    .empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; }
    .loading-msg { text-align: center; padding: 16px; color: var(--text-secondary); font-size: 14px; }
    .spinner {
      display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">📄 レポート出力</div>
    <div class="header-nav" id="headerNav"></div>
  </div>

  <div class="content">
    <div class="card">
      <div class="section-label">レポート種別</div>
      <select id="reportType">
        <option value="weekly">週次レポート（A4横）</option>
        <option value="monthly">月次レポート（A4縦）</option>
      </select>
    </div>

    <div class="card" id="weekCard">
      <div class="section-label">出力する週を選択</div>
      <select id="weekSelect">
        <option value="">-- 週を選択してください --</option>
      </select>
    </div>

    <div class="card" id="monthCard" style="display:none">
      <div class="section-label">出力する月を選択</div>
      <select id="monthSelect">
        <option value="">-- 月を選択してください --</option>
      </select>
    </div>

    <div class="card">
      <div class="btn-row">
        <button class="btn btn-preview" id="previewBtn" disabled>👁 プレビュー</button>
        <button class="btn btn-pdf" id="printBtn" disabled>🖨 印刷 / PDF保存</button>
      </div>
    </div>

    <div id="previewArea"></div>
  </div>

  <script>
    let selectedStart = '';
    let selectedMonth = '';

    function onReportTypeChange() {
      const type = document.getElementById('reportType').value;
      document.getElementById('weekCard').style.display = type === 'weekly' ? '' : 'none';
      document.getElementById('monthCard').style.display = type === 'monthly' ? '' : 'none';
      document.getElementById('previewArea').innerHTML = '';
      document.getElementById('previewBtn').disabled = true;
      document.getElementById('printBtn').disabled = true;
    }

    async function init() {
      const res = await fetch('/api/report/weeks');
      if (res.status === 401) { location.href = '/'; return; }
      const weeks = await res.json();
      const sel = document.getElementById('weekSelect');
      if (!weeks.length) {
        sel.innerHTML = '<option value="">記録がありません</option>';
      } else {
        weeks.forEach(w => {
          const label = formatWeekLabel(w.start, w.end);
          const opt = document.createElement('option');
          opt.value = w.start;
          opt.textContent = label;
          sel.appendChild(opt);
        });
      }
      await initMonths();
    }

    async function initMonths() {
      const sel = document.getElementById('monthSelect');
      try {
        const res = await fetch('/api/report/months');
        if (!res.ok) {
          sel.innerHTML = '<option value="">月リストの取得に失敗しました</option>';
          return;
        }
        const months = await res.json();
        if (!months.length) {
          sel.innerHTML = '<option value="">記録がありません</option>';
          return;
        }
        months.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.month;
          opt.textContent = m.label;
          sel.appendChild(opt);
        });
      } catch (e) {
        sel.innerHTML = '<option value="">月リストの取得に失敗しました</option>';
      }
    }

    function formatWeekLabel(start, end) {
      const s = new Date(start + 'T00:00:00');
      const e = new Date(end   + 'T00:00:00');
      const wd = ['日','月','火','水','木','金','土'];
      const fmt = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;
      return `${fmt(s)} 〜 ${e.getMonth()+1}月${e.getDate()}日（${wd[e.getDay()]}）`;
    }

    function onWeekChange() {
      selectedStart = document.getElementById('weekSelect').value;
      const has = !!selectedStart;
      document.getElementById('previewBtn').disabled = !has;
      document.getElementById('printBtn').disabled = !has;
      document.getElementById('previewArea').innerHTML = '';
    }

    function onMonthChange() {
      selectedMonth = document.getElementById('monthSelect').value;
      const has = !!selectedMonth;
      document.getElementById('previewBtn').disabled = !has;
      document.getElementById('printBtn').disabled = !has;
      document.getElementById('previewArea').innerHTML = '';
    }

    async function loadPreview() {
      const type = document.getElementById('reportType').value;
      let url;
      if (type === 'weekly') {
        if (!selectedStart) return;
        url = '/api/report/preview?start=' + selectedStart;
      } else {
        if (!selectedMonth) return;
        url = '/api/report/monthly-preview?month=' + selectedMonth;
      }
      const previewLabel = type === 'weekly' ? 'A4横' : 'A4縦';
      const area = document.getElementById('previewArea');
      area.innerHTML = '<div class="loading-msg"><span class="spinner"></span>プレビューを生成中...</div>';
      setButtons(true);
      try {
        const res = await fetch(url);
        if (!res.ok) throw res;
        const html = await res.text();
        area.innerHTML =
          '<div class="preview-card">' +
            '<div class="preview-title">プレビュー（' + previewLabel + '）' +
              '<button class="expand-btn" id="expandBtn">⤢ 拡大</button>' +
            '</div>' +
            '<iframe id="previewFrame" srcdoc="" style="height:520px"></iframe>' +
          '</div>';
        document.getElementById('expandBtn').addEventListener('click', toggleFullPreview);
        document.getElementById('previewFrame').srcdoc = html;
      } catch(e) {
        handleFetchError(area, e);
      } finally {
        setButtons(false);
      }
    }

    function toggleFullPreview() {
      const iframe = document.getElementById('previewFrame');
      const btn = document.getElementById('expandBtn');
      if (!iframe) return;
      if (iframe.style.height !== '520px') {
        iframe.style.height = '520px';
        btn.textContent = '⤢ 拡大';
      } else {
        iframe.style.height = 'calc(100vh - 120px)';
        btn.textContent = '⤡ 縮小';
      }
    }

    function openPrint() {
      const type = document.getElementById('reportType').value;
      if (type === 'weekly') {
        if (!selectedStart) return;
        window.open('/api/report/preview?start=' + selectedStart, '_blank');
      } else {
        if (!selectedMonth) return;
        window.open('/api/report/monthly-preview?month=' + selectedMonth, '_blank');
      }
    }

    function setButtons(loading) {
      document.getElementById('previewBtn').disabled = loading;
      document.getElementById('printBtn').disabled = loading;
    }

    document.getElementById('reportType').addEventListener('change', onReportTypeChange);
    document.getElementById('weekSelect').addEventListener('change', onWeekChange);
    document.getElementById('monthSelect').addEventListener('change', onMonthChange);
    document.getElementById('previewBtn').addEventListener('click', loadPreview);
    document.getElementById('printBtn').addEventListener('click', openPrint);

    init();
  </script>
  <script src="/static/common.js"></script>
  <script>
    initNav('report');
    initTheme();
</script>
</body>
</html>
