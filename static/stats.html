<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>集計・グラフ</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    .period-bar {
      display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: var(--header-bg);
    }
    .period-btn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; font-size: 13px; cursor: pointer; color: var(--accent);
    }
    .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .content { padding: 16px; max-width: 800px; margin: 0 auto; }
    .chart-card {
      background: var(--card-bg); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 16px; margin-bottom: 16px;
    }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--bubble-ai-text, #1c1c1e); }
    .chart-wrap { position: relative; height: 200px; }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .summary-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;
    }
    .summary-card {
      background: var(--card-bg); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 12px; text-align: center;
    }
    .summary-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .summary-val-negative { color: var(--danger, #ff3b30); }
    .summary-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .summary-card-pfc .summary-val { font-size: 13px; line-height: 1.4; }
    .summary-card-combined { text-align: left; padding: 10px 14px; }
    .summary-card-combined .summary-label { text-align: center; margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }
    .summary-combined-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
    .summary-combined-label { font-size: 12px; color: var(--text-secondary); }
    .summary-combined-val { font-size: 15px; font-weight: 700; color: var(--accent); }
    /* モーダルサイズのみ上書き（stats固有: 小さめサイズ） */
    .modal-box { width: min(360px, 90vw); max-height: unset; }
    .modal-row { margin-bottom: 14px; }
    /* 表示設定モーダル */
    #widgetModal .modal-box, #summaryModal .modal-box { width: min(340px, 92vw); max-height: 80vh; display: flex; flex-direction: column; }
    .widget-modal-body { overflow-y: auto; flex: 1; padding: 4px 0; }
    .widget-list { list-style: none; margin: 0; padding: 0; }
    .widget-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .widget-item:last-child { border-bottom: none; }
    .widget-item.drag-over { background: var(--accent-light, rgba(0,122,255,0.1)); }
    .widget-drag-handle { color: var(--text-secondary); font-size: 16px; flex-shrink: 0; cursor: grab; }
    .widget-item-label { flex: 1; font-size: 14px; }
    .widget-toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .widget-toggle input { opacity: 0; width: 0; height: 0; }
    .widget-toggle-slider {
      position: absolute; inset: 0; border-radius: 24px;
      background: var(--border); transition: background 0.2s;
    }
    .widget-toggle-slider::before {
      content: ''; position: absolute; width: 18px; height: 18px;
      border-radius: 50%; background: #fff; left: 3px; top: 3px;
      transition: transform 0.2s;
    }
    .widget-toggle input:checked + .widget-toggle-slider { background: var(--accent); }
    .widget-toggle input:checked + .widget-toggle-slider::before { transform: translateX(20px); }
    /* トースト通知 */
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: var(--bg); padding: 10px 20px; border-radius: 20px;
      font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
      white-space: normal; text-align: center; max-width: 90vw; z-index: 300;
    }
    .toast.show { opacity: 1; }
    .toast.toast-error { background: var(--danger); color: #fff; }
    @media (max-width: 480px) { .toast { top: 12px; font-size: 13px; padding: 8px 16px; } }
    .period-shift-btn {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--accent); font-size: 13px; cursor: pointer;
    }
    .period-shift-btn:disabled { color: var(--text-secondary); opacity: 0.5; cursor: default; }
    /* D-3: タッチターゲット最低44px確保 */
    @media (hover: none) {
      .widget-item { min-height: 44px; }
      .widget-drag-handle { padding: 0 8px; font-size: 20px; }
    }
    /* モバイル: サマリー3カラム → 1カラム横並び */
    @media (max-width: 480px) {
      .summary-row { grid-template-columns: 1fr; gap: 6px; }
      .summary-card {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 12px; text-align: left;
      }
      .summary-val { font-size: 18px; }
      .summary-label { margin-top: 0; font-size: 12px; }
      .summary-card-combined { display: block; text-align: left; }
      .summary-card-combined .summary-label { margin-top: 6px; }
    }
  </style>
<script>(function(){try{if(localStorage.getItem('healthreport_sidebar')==='open'&&window.innerWidth>768&&document.body){document.body.classList.add('sidebar-open');}}catch(_){}})();</script>
</head>
<body>
  <div class="header">
    <div class="header-title">📊 集計・グラフ</div>
    <div class="header-nav" id="headerNav"></div>
  </div>
  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod(7, this)">直近7日</button>
    <button class="period-btn" onclick="setPeriod(30, this)">直近30日</button>
    <button class="period-btn" id="customBtn" onclick="openDateModal()">📅 期間指定</button>
    <button class="period-btn" id="widgetSettingsBtn" onclick="openWidgetSettings()">⚙️ 表示設定</button>
    <button class="period-btn" id="summarySettingsBtn" onclick="openSummarySettings()">📋 サマリー設定</button>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="period-shift-btn" id="prevBtn" onclick="shiftPeriod(-1)" title="前の期間（最大1年前まで）">◀ 前</button>
      <button class="period-shift-btn" id="nextBtn" onclick="shiftPeriod(1)" disabled>次 ▶</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading-spinner">読み込み中...</div>
  </div>

  <!-- 期間指定モーダル -->
  <div class="modal-overlay" id="dateModal" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal-box">
      <div class="modal-title">📅 期間を指定</div>
      <div class="modal-row">
        <label>開始日</label>
        <input type="date" id="startDate" />
      </div>
      <div class="modal-row">
        <label>終了日</label>
        <input type="date" id="endDate" />
      </div>
      <div class="modal-actions">
        <button onclick="closeDateModal()">キャンセル</button>
        <button class="primary" onclick="applyDateRange()">適用</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 表示設定モーダル -->
  <div class="modal-overlay" id="widgetModal" style="display:none" onclick="handleWidgetOverlayClick(event)">
    <div class="modal-box">
      <div class="modal-title">⚙️ 表示設定</div>
      <div class="widget-modal-body">
        <ul class="widget-list" id="widgetList"></ul>
      </div>
      <div class="modal-actions">
        <button onclick="closeWidgetSettings()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- サマリー設定モーダル -->
  <div class="modal-overlay" id="summaryModal" style="display:none" onclick="handleSummaryOverlayClick(event)">
    <div class="modal-box">
      <div class="modal-title">📋 サマリー設定</div>
      <div class="widget-modal-body">
        <ul class="widget-list" id="summaryList"></ul>
      </div>
      <div class="modal-actions">
        <button onclick="closeSummarySettings()">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    // datalabels プラグインを登録・デフォルト無効（必要なチャートのみ有効化）
    Chart.register(ChartDataLabels);
    Chart.defaults.plugins.datalabels.display = false;

    let charts = {};
    var _touchDragState = { srcEl: null };
    var _touchCleanups = [];
    const pageState = {
      dateRange: { start: null, end: null },
      dates: [],
      currentDays: 7,
      _shiftedEnd: null,     // 期間シフト後の実効end日付
      widgetConfig: [],      // [{id, visible}, ...] 表示順（保存済み＋マージ済み）
      widgetRegistry: [],    // [{id, label, emoji, widget_type, canvas_id, wrap_style}, ...]
      modalWidgetConfig: [], // モーダル編集中の一時状態（完了/キャンセルで確定/破棄）
      _dragSrcEl: null,      // DnD中のドラッグ元要素（pageState集約）
      summaryConfig: [],       // [{id, visible}, ...] サマリーアイテム設定
      modalSummaryConfig: [],  // サマリーモーダル編集中の一時状態
      _lastStatsData: null,    // 最後のstatsレスポンス（サマリー再描画用）
    };

    // ── ウィジェットヘルパー ──────────────────────────────────────────────────

    function mergeWidgetConfig(saved, registry, defaultVisible) {
      if (defaultVisible === undefined) defaultVisible = true;
      var registryIds = registry.map(function(r) { return r.id; });
      var merged = saved.filter(function(w) { return registryIds.indexOf(w.id) !== -1; });
      var savedIds = merged.map(function(w) { return w.id; });
      registry.forEach(function(r) {
        if (savedIds.indexOf(r.id) === -1) {
          merged.push({ id: r.id, visible: defaultVisible });
        }
      });
      return merged;
    }

    function isWidgetVisible(id) {
      var w = pageState.widgetConfig.find(function(w) { return w.id === id; });
      return w ? w.visible : true;
    }

    function _canvasId(widgetId) {
      var meta = pageState.widgetRegistry.find(function(r) { return r.id === widgetId; });
      return meta ? meta.canvas_id : null;
    }

    // ── サマリーアイテムレジストリ ──────────────────────────────────────────────
    var SUMMARY_ITEM_REGISTRY = [
      { id: 'avg_calories',          label: '平均摂取カロリー',                   unit: 'kcal', emoji: '🔥' },
      { id: 'latest_weight',         label: '最新体重',                           unit: 'kg',   emoji: '⚖️' },
      { id: 'avg_steps',             label: '平均歩数',                           unit: '歩',   emoji: '👟' },
      { id: 'avg_bp',                label: '血圧（平均）',                       unit: 'mmHg', emoji: '💉' },
      { id: 'avg_total_expenditure', label: '総消費カロリー平均',                 unit: 'kcal', emoji: '🔥' },
      { id: 'avg_exercise_cal',      label: '消費カロリー平均（基礎代謝除く）',   unit: 'kcal', emoji: '🏃' },
      { id: 'avg_calorie_balance',   label: 'カロリー収支平均',                   unit: 'kcal', emoji: '📊' },
      { id: 'avg_pfc',               label: 'PFCバランス平均',                    unit: '',     emoji: '🥩' },
      { id: 'avg_weight',            label: '平均体重',                           unit: 'kg',   emoji: '⚖️' },
      { id: 'weight_change',         label: '体重変動',                           unit: 'kg',   emoji: '📉' },
      { id: 'calorie_goal_rate',     label: '目標カロリー達成率',                 unit: '%',    emoji: '🎯' },
      { id: 'calorie_summary',       label: 'カロリー情報まとめ',                 unit: '',     emoji: '🔥', combined: true },
      { id: 'weight_summary',        label: '体重情報まとめ',                     unit: '',     emoji: '⚖️', combined: true },
      { id: 'latest_body_fat',       label: '最新体脂肪率',                       unit: '%',    emoji: '📊' },
      { id: 'avg_body_fat',          label: '平均体脂肪率',                       unit: '%',    emoji: '📊' },
    ];

    // ── サマリー計算ディスパッチテーブル ──────────────────────────────────────────
    // 各関数は { value: string, hasData: boolean } を返す
    var SUMMARY_CALC_FUNCTIONS = {
      avg_calories: function(data) {
        var valid = data.calories.filter(function(v) { return v != null; });
        if (!valid.length) return { value: '—', hasData: false };
        var avg = Math.round(valid.reduce(function(a, b) { return a + b; }, 0) / valid.length);
        return { value: avg.toLocaleString(), hasData: true };
      },
      latest_weight: function(data) {
        // 日付逆順で最初の非null値を返す（C-6修正: concat順序エッジケース回避）
        for (var i = (data.dates || []).length - 1; i >= 0; i--) {
          var we = data.weights_evening ? data.weights_evening[i] : null;
          if (we != null) return { value: we, hasData: true };
          var wm = data.weights_morning ? data.weights_morning[i] : null;
          if (wm != null) return { value: wm, hasData: true };
        }
        return { value: '—', hasData: false };
      },
      avg_steps: function(data) {
        var valid = (data.steps || []).filter(function(v) { return v != null; });
        if (!valid.length) return { value: '—', hasData: false };
        var avg = Math.round(valid.reduce(function(a, b) { return a + b; }, 0) / valid.length);
        return { value: avg.toLocaleString(), hasData: true };
      },
      avg_bp: function(data) {
        var bp = data.blood_pressure || {};
        var sysVals = (bp.morning_systolic || []).concat(bp.evening_systolic || []).filter(function(v) { return v != null; });
        var diaVals = (bp.morning_diastolic || []).concat(bp.evening_diastolic || []).filter(function(v) { return v != null; });
        if (!sysVals.length || !diaVals.length) return { value: '—', hasData: false };
        var avgSys = Math.round(sysVals.reduce(function(a, b) { return a + b; }, 0) / sysVals.length);
        var avgDia = Math.round(diaVals.reduce(function(a, b) { return a + b; }, 0) / diaVals.length);
        return { value: avgSys + '/' + avgDia, hasData: true };
      },
      avg_total_expenditure: function(data) {
        var valid = (data.total_expenditure || []).filter(function(v) { return v != null; });
        if (!valid.length) return { value: '—', hasData: false };
        var avg = Math.round(valid.reduce(function(a, b) { return a + b; }, 0) / valid.length);
        return { value: avg.toLocaleString(), hasData: true };
      },
      avg_exercise_cal: function(data) {
        var valid = (data.exercise_calories || []).filter(function(v) { return v != null; });
        if (!valid.length) return { value: '—', hasData: false };
        var avg = Math.round(valid.reduce(function(a, b) { return a + b; }, 0) / valid.length);
        return { value: avg.toLocaleString(), hasData: true };
      },
      avg_calorie_balance: function(data) {
        var exp = data.total_expenditure || [];
        var cal = data.calories || [];
        var diffs = [];
        for (var i = 0; i < cal.length; i++) {
          if (exp[i] != null && cal[i] != null) {
            diffs.push(exp[i] - cal[i]);
          }
        }
        if (!diffs.length) return { value: '—', hasData: false };
        var avg = Math.round(diffs.reduce(function(a, b) { return a + b; }, 0) / diffs.length);
        var sign = avg > 0 ? '+' : '';
        return { value: sign + avg.toLocaleString(), hasData: true, numValue: avg };
      },
      avg_pfc: function(data) {
        var pValid = (data.protein || []).filter(function(v) { return v != null; });
        var fValid = (data.fat || []).filter(function(v) { return v != null; });
        var cValid = (data.carbs || []).filter(function(v) { return v != null; });
        if (!pValid.length && !fValid.length && !cValid.length) return { value: '—', hasData: false };
        var avgP = pValid.length ? pValid.reduce(function(a, b) { return a + b; }, 0) / pValid.length : 0;
        var avgF = fValid.length ? fValid.reduce(function(a, b) { return a + b; }, 0) / fValid.length : 0;
        var avgC = cValid.length ? cValid.reduce(function(a, b) { return a + b; }, 0) / cValid.length : 0;
        var total = avgP + avgF + avgC;
        var pctP = total > 0 ? Math.round(avgP / total * 100) : 0;
        var pctF = total > 0 ? Math.round(avgF / total * 100) : 0;
        var pctC = total > 0 ? 100 - pctP - pctF : 0;
        return {
          value: 'P:' + Math.round(avgP) + 'g(' + pctP + '%) F:' + Math.round(avgF) + 'g(' + pctF + '%) C:' + Math.round(avgC) + 'g(' + pctC + '%)',
          hasData: true
        };
      },
      avg_weight: function(data) {
        var all = (data.weights_morning || []).concat(data.weights_evening || []).filter(function(v) { return v != null; });
        if (!all.length) return { value: '—', hasData: false };
        var avg = all.reduce(function(a, b) { return a + b; }, 0) / all.length;
        return { value: avg.toFixed(1), hasData: true };
      },
      weight_change: function(data) {
        var all = [];
        for (var i = 0; i < (data.dates || []).length; i++) {
          var wm = data.weights_morning ? data.weights_morning[i] : null;
          var we = data.weights_evening ? data.weights_evening[i] : null;
          var w = we != null ? we : wm;
          if (w != null) all.push(w);
        }
        if (all.length < 2) return { value: '—', hasData: false };
        var diff = all[all.length - 1] - all[0];
        var sign = diff > 0 ? '+' : '';
        return { value: sign + diff.toFixed(1), hasData: true, numValue: diff };
      },
      calorie_goal_rate: function(data) {
        var goal = data.calories_goal;
        if (!goal) return { value: '—', hasData: false };
        var valid = data.calories.filter(function(v) { return v != null; });
        if (!valid.length) return { value: '—', hasData: false };
        var met = valid.filter(function(v) { return v <= goal; }).length;
        var rate = Math.round(met / valid.length * 100);
        return { value: rate, hasData: true };
      },
      calorie_summary: function(data) {
        var avgCal = SUMMARY_CALC_FUNCTIONS.avg_calories(data);
        var avgExp = SUMMARY_CALC_FUNCTIONS.avg_total_expenditure(data);
        var bal = SUMMARY_CALC_FUNCTIONS.avg_calorie_balance(data);
        var goal = SUMMARY_CALC_FUNCTIONS.calorie_goal_rate(data);
        if (!avgCal.hasData && !avgExp.hasData) return { value: '—', hasData: false };
        return {
          value: '', hasData: true,
          rows: [
            { label: '摂取平均', value: avgCal.hasData ? avgCal.value + ' kcal' : '—' },
            { label: '消費平均', value: avgExp.hasData ? avgExp.value + ' kcal' : '—' },
            { label: '収支平均', value: bal.hasData ? bal.value + ' kcal' : '—', negative: bal.hasData && bal.numValue < 0 },
            { label: '目標達成率', value: goal.hasData ? goal.value + '%' : '—' },
          ]
        };
      },
      weight_summary: function(data) {
        var latest = SUMMARY_CALC_FUNCTIONS.latest_weight(data);
        var avg = SUMMARY_CALC_FUNCTIONS.avg_weight(data);
        var change = SUMMARY_CALC_FUNCTIONS.weight_change(data);
        if (!latest.hasData && !avg.hasData) return { value: '—', hasData: false };
        return {
          value: '', hasData: true,
          rows: [
            { label: '最新', value: latest.hasData ? latest.value + ' kg' : '—' },
            { label: '平均', value: avg.hasData ? avg.value + ' kg' : '—' },
            { label: '変動', value: change.hasData ? change.value + ' kg' : '—', negative: change.hasData && change.numValue > 0 },
          ]
        };
      },
      latest_body_fat: function(data) {
        var bf = data.body_fat || [];
        for (var i = bf.length - 1; i >= 0; i--) {
          if (bf[i] != null) return { value: bf[i], hasData: true };
        }
        return { value: '—', hasData: false };
      },
      avg_body_fat: function(data) {
        var valid = (data.body_fat || []).filter(function(v) { return v != null; });
        if (!valid.length) return { value: '—', hasData: false };
        var avg = valid.reduce(function(a, b) { return a + b; }, 0) / valid.length;
        return { value: avg.toFixed(1), hasData: true };
      },
    };

    // ── サマリーHTML生成 ──────────────────────────────────────────────────────
    function buildSummaryHtml(data) {
      var visibleItems = pageState.summaryConfig.filter(function(w) { return w.visible; });
      if (!visibleItems.length) return '';
      var colCount = Math.min(visibleItems.length, 3);
      var cards = '';
      visibleItems.forEach(function(w) {
        var meta = SUMMARY_ITEM_REGISTRY.find(function(r) { return r.id === w.id; });
        if (!meta) return;
        var calcFn = SUMMARY_CALC_FUNCTIONS[w.id];
        if (!calcFn) return;
        var result = calcFn(data);
        // 複合カード（rows付き）
        if (meta.combined && result.rows) {
          var rowsHtml = '';
          result.rows.forEach(function(r) {
            var rValClass = r.negative ? 'summary-combined-val summary-val-negative' : 'summary-combined-val';
            rowsHtml += '<div class="summary-combined-row">' +
              '<span class="summary-combined-label">' + r.label + '</span>' +
              '<span class="' + rValClass + '">' + r.value + '</span>' +
              '</div>';
          });
          cards += '<div class="summary-card summary-card-combined">' +
            rowsHtml +
            '<div class="summary-label">' + meta.emoji + ' ' + meta.label + '</div>' +
            '</div>';
          return;
        }
        // 単一値カード
        var displayVal = result.hasData ? result.value : '—';
        var valClass = 'summary-val';
        // カロリー収支: 負なら赤色
        if (w.id === 'avg_calorie_balance' && result.hasData && result.numValue < 0) {
          valClass += ' summary-val-negative';
        }
        // 体重変動: 増加なら赤色
        if (w.id === 'weight_change' && result.hasData && result.numValue > 0) {
          valClass += ' summary-val-negative';
        }
        // PFCは特別なレイアウト（小さめフォント）
        var extraClass = w.id === 'avg_pfc' ? ' summary-card-pfc' : '';
        var unitStr = meta.unit ? ' (' + meta.unit + ')' : '';
        cards += '<div class="summary-card' + extraClass + '">' +
          '<div class="' + valClass + '">' + displayVal + '</div>' +
          '<div class="summary-label">' + meta.label + unitStr + '</div>' +
          '</div>';
      });
      return '<div class="summary-row" style="grid-template-columns:repeat(' + colCount + ',1fr)">' + cards + '</div>';
    }

                    var lines = [];
                    var skips = extras.mealSkips[d] || [];
                    if (skips.length) {
                      lines.push('食べなかった: ' + skips.map(function(mt) { return SKIP_LABELS_JA[mt] || mt; }).join('・'));
                    }
                    if (extras.hasExpenditure) {
                      var intakeVal = data.calories[idx];
                      var expVal = extras.totalExp[idx];
                      if (expVal != null) {
                        var exVal = extras.exCal[idx] || 0;

                        lines.push('');

                  if (ctx.chart.data.labels.length > 30) return false;
                  var ca = ctx.chart.chartArea;
                  if (!ca) return false;
                  if ((ca.width / ctx.chart.data.labels.length) < 28) return false;
                  var yScale = ctx.chart.scales.y;

                  var pixPerUnit = ca.height / (yScale.max - yScale.min);

                  var total = datasets.reduce(function(s, ds) { return s + (ds.data[i] || 0); }, 0);

                  var pct = Math.round(v / total * 100);
                  return v + 'g\n(' + pct + '%)';

    // ── メイン処理 ────────────────────────────────────────────────────────────

    function destroyCharts() {
      Object.values(charts).forEach(function(c) { c.destroy(); });
      charts = {};
    }

    async function load(days, start, end) {
      document.getElementById('content').innerHTML = '<div class="loading-spinner">読み込み中...</div>';
      destroyCharts();
      const today = new Date().toISOString().slice(0, 10);
      if (start && end) {
        pageState.dateRange = { start, end };
      } else {
        pageState.currentDays = days;
        const s = new Date(Date.now() - (days - 1) * 86400000).toISOString().slice(0, 10);
        pageState.dateRange = { start: s, end: today };
      }

      updateShiftButtons();

      // レジストリ未取得の場合のみ取得（ページ内で1回）
      if (!pageState.widgetRegistry.length) {
        try {
          const [settRes, regRes] = await Promise.all([
            fetch('/api/settings'),
            fetch('/api/stats/widgets'),
          ]);
          if (settRes.status === 401 || regRes.status === 401) { location.href = '/'; return; }
          if (!settRes.ok) throw settRes;
          if (!regRes.ok) throw regRes;
          const sett = await settRes.json();
          const reg = await regRes.json();
          pageState.widgetRegistry = reg.widgets || [];
          var savedRaw = sett.stats_widgets || '[]';
          var savedConfig = [];
          try {
            savedConfig = JSON.parse(savedRaw);
            if (!Array.isArray(savedConfig)) savedConfig = [];
          } catch (e) {
            console.error('stats_widgets parse error, using default:', e);
            savedConfig = [];
          }
          pageState.widgetConfig = mergeWidgetConfig(savedConfig, pageState.widgetRegistry);
          // サマリーアイテム設定
          var summaryRaw = sett.stats_summary_items || '[]';
          var savedSummary = [];
          try {
            savedSummary = JSON.parse(summaryRaw);
            if (!Array.isArray(savedSummary)) savedSummary = [];
          } catch (e2) {
            console.error('stats_summary_items parse error, using default:', e2);
            savedSummary = [];
          }
          pageState.summaryConfig = mergeWidgetConfig(savedSummary, SUMMARY_ITEM_REGISTRY, false);
        } catch(e) {
          handleFetchError(document.getElementById('content'), e);
          return;
        }
      }

      const url = start && end
        ? `/api/stats?start=${start}&end=${end}`
        : `/api/stats?days=${days}`;
      try {
        const res = await fetch(url);
        if (res.status === 401) { location.href = '/'; return; }
        if (!res.ok) throw res;
        const data = await res.json();
        render(data);
        loadVitalCharts().catch(function(e) { console.error('バイタルチャート読み込みエラー:', e); });
      } catch(e) {
        handleFetchError(document.getElementById('content'), e);
      }
    }

    function shortDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return `${d.getMonth()+1}/${d.getDate()}`;
    }

    function render(data) {
      const labels = data.dates.map(shortDate);
      const goal = data.calories_goal;
      const mealSkips = data.meal_skips || {};
      const totalExp = data.total_expenditure || [];
      const exCal = data.exercise_calories || [];
      const bmrKcal = data.bmr_kcal || null;
      const hasExpenditure = totalExp.some(function(v) { return v != null; });
      pageState.dates = data.dates;

      pageState._lastStatsData = data;

      // ── HTML生成 ─────────────────────────────────────────────────────────
      // ウィジェットIDのif-else分岐なし。widgetRegistryのmetaで完全制御。
      var html = '';
      pageState.widgetConfig.forEach(function(w) {
        if (!w.visible) return;
        var meta = pageState.widgetRegistry.find(function(r) { return r.id === w.id; });
        if (!meta) return;
        if (meta.widget_type === 'summary') {
          html += buildSummaryHtml(data);
        } else if (meta.widget_type === 'chart') {
          var wrapStyle = meta.wrap_style ? ' style="' + meta.wrap_style + '"' : '';
          html += '<div class="chart-card">' +
                  '<div class="chart-title">' + meta.emoji + ' ' + meta.label + '</div>' +
                  '<div class="chart-wrap"' + wrapStyle + '>' +
                  '<canvas id="' + meta.canvas_id + '" role="img" aria-label="' + meta.label + 'グラフ"></canvas>' +
                  '</div></div>';
        }
      });
      // U-3: 全ウィジェット非表示時のプレースホルダー
      if (!html) {
        html = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">' +
               '表示するウィジェットがありません。<br>⚙️ 表示設定 から表示項目を選択してください。</div>';
      }
      document.getElementById('content').innerHTML = html;

      // ── チャート描画 ──────────────────────────────────────────────────────
      const period = data.period || labels.length;
      const isLong = period > 60;
      const xMaxTicks = period <= 14 ? period : period <= 31 ? 10 : period <= 90 ? 12 : 13;
      const rootStyle = getComputedStyle(document.documentElement);
      const chartTextColor = rootStyle.getPropertyValue('--text-secondary').trim() || '#8e8e93';
      const chartGridColor = rootStyle.getPropertyValue('--border').trim() || '#e5e5ea';

      const defaults = {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: false, axis: 'x' },
        plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12, color: chartTextColor } } },
        scales: {
          x: { ticks: { font: { size: 11 }, maxTicksLimit: xMaxTicks, maxRotation: period > 30 ? 45 : 0, color: chartTextColor }, grid: { color: chartGridColor } },
          y: { ticks: { font: { size: 11 }, color: chartTextColor }, grid: { color: chartGridColor } }
        }
      };
      const extras = { isLong, mealSkips, hasExpenditure, exCal, bmrKcal, totalExp, goal, xMaxTicks, chartTextColor, chartGridColor, period };

      // ディスパッチテーブルで分岐なし
      pageState.widgetConfig.forEach(function(w) {
        if (!w.visible) return;
        var drawFn = CHART_DRAW_FUNCTIONS[w.id];
        if (drawFn) drawFn(data, labels, defaults, extras);
      });
    }

    function setPeriod(days, btn) {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pageState._shiftedEnd = null;
      load(days, null, null);
    }

    function openDateModal() {
      const today = new Date().toISOString().slice(0, 10);

    function applyDateRange() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;

    function shiftPeriod(direction) {
      var dr = pageState.dateRange;
      if (!dr.start || !dr.end) return;
      var s = new Date(dr.start + 'T00:00:00');
      var e = new Date(dr.end + 'T00:00:00');
      var shiftDays = Math.round((e - s) / 86400000) + 1;

      var today = new Date();
      today.setHours(0, 0, 0, 0);

      var ms = 86400000 * direction;
      var newStart = new Date(s.getTime() + ms);
      var newEnd   = new Date(e.getTime() + ms);

      if (newStart > today) return;
      if (newEnd > today) newEnd = today;

      var minDate = new Date(today);
      minDate.setFullYear(minDate.getFullYear() - 1);
      if (direction === -1 && newStart < minDate) {
        newStart = minDate;
        if (newStart >= newEnd) return;
      }

      var startStr = newStart.toISOString().slice(0, 10);
      var endStr   = newEnd.toISOString().slice(0, 10);

      document.querySelectorAll('.period-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById('customBtn').classList.add('active');
      document.getElementById('customBtn').textContent =
        '\u{1f4c5} ' + startStr.slice(5).replace('-', '/') + ' \u301c ' + endStr.slice(5).replace('-', '/');

      load(null, startStr, endStr);
    }

    function updateShiftButtons() {
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayStr = today.toISOString().slice(0, 10);
      var dr = pageState.dateRange;

      var nextBtn = document.getElementById('nextBtn');
      var prevBtn = document.getElementById('prevBtn');
      if (!nextBtn || !prevBtn) return;

      nextBtn.disabled = (!dr.end || dr.end >= todayStr);

      var minDate = new Date(today);
      minDate.setFullYear(minDate.getFullYear() - 1);
      var minDateStr = minDate.toISOString().slice(0, 10);
      prevBtn.disabled = (!dr.start || dr.start <= minDateStr);
    }

    async function loadVitalCharts() {
      var start = pageState.dateRange.start;
      var end = pageState.dateRange.end;
      var dates = pageState.dates;
      if (!dates.length || !start || !end) return;

      var needSleep = isWidgetVisible('sleep');
      var needHeart = isWidgetVisible('heart_rate');
      var needSpo2  = isWidgetVisible('spo2');
      if (!needSleep && !needHeart && !needSpo2) return;

      var promises = [];
      if (needSleep) promises.push(fetch('/api/sleep/summary?start_date=' + start + '&end_date=' + end));
      else           promises.push(Promise.resolve(null));
      if (needHeart) promises.push(fetch('/api/vitals/summary?start_date=' + start + '&end_date=' + end + '&type=heart_rate'));
      else           promises.push(Promise.resolve(null));
      if (needSpo2)  promises.push(fetch('/api/vitals/summary?start_date=' + start + '&end_date=' + end + '&type=spo2'));
      else           promises.push(Promise.resolve(null));

      const [sleepRes, heartRes, spo2Res] = await Promise.all(promises);
      if (needSleep && sleepRes && sleepRes.ok) {
        var sleepData = await sleepRes.json();
        renderSleepChart(sleepData.logs || [], dates);
      }
      if (needHeart && heartRes && heartRes.ok) {
        var heartData = await heartRes.json();
        renderHeartRateChart(heartData.logs || [], dates);
      }
      if (needSpo2 && spo2Res && spo2Res.ok) {
        var spo2Data = await spo2Res.json();
        renderSpo2Chart(spo2Data.logs || [], dates);
      }
    }

    function _getChartColors() {
      var s = getComputedStyle(document.documentElement);

    function renderSleepChart(logs, dates) {
      var canvas = document.getElementById('chartSleep');
      if (!logs.length) {
        if (charts.sleep) { charts.sleep.destroy(); delete charts.sleep; }
        canvas.parentElement.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:24px">睡眠データがありません。Apple Watch連携で記録できます。</p>';
        return;
      }
      var byDate = {};
      logs.forEach(function(log) { byDate[log.date] = log; });
      var labels = dates.map(shortDate);
      var deep  = dates.map(function(d) { return byDate[d] ? (byDate[d].deep_minutes  || 0) : null; });
      var rem   = dates.map(function(d) { return byDate[d] ? (byDate[d].rem_minutes   || 0) : null; });
      var awake = dates.map(function(d) { return byDate[d] ? (byDate[d].awake_minutes || 0) : null; });
      var light = dates.map(function(d) {
        if (!byDate[d]) return null;
        var l = byDate[d];
        var acc = (l.deep_minutes||0) + (l.rem_minutes||0) + (l.awake_minutes||0);
        return Math.max(0, (l.duration_minutes||0) - acc);
      });
      var c = _getChartColors();
      if (charts.sleep) charts.sleep.destroy();
      charts.sleep = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: '深睡眠', data: deep,  backgroundColor: 'rgba(147,51,234,0.85)', stack: 'sleep' },
            { label: 'REM',    data: rem,   backgroundColor: 'rgba(59,130,246,0.85)', stack: 'sleep' },
            { label: '浅睡眠', data: light, backgroundColor: 'rgba(14,165,233,0.75)', stack: 'sleep' },
            { label: '覚醒',   data: awake, backgroundColor: 'rgba(248,113,113,0.85)', stack: 'sleep' },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { font: { size: 10 }, boxWidth: 10, color: c.text } },
            datalabels: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var v = ctx.parsed.y;
                  if (!v) return ctx.dataset.label + ': —';
                  var h = Math.floor(v / 60), m = v % 60;
                  return ctx.dataset.label + ': ' + (h > 0 ? h + 'h ' : '') + m + 'm';
                }

          scales: {

            y: { stacked: true, beginAtZero: true, ticks: { font: { size: 10 }, color: c.text }, grid: { color: c.grid } }
          }
        }
      });
    }

    function attachDragEvents(ul) {
      // 前回のタッチリスナーをクリーンアップ
      _touchCleanups.forEach(function(fn) { fn(); });
      _touchCleanups = [];

      ul.querySelectorAll('.widget-item').forEach(function(item) {
        // PC: HTML5 Drag and Drop — ハンドルからのみドラッグ開始
        var handle = item.querySelector('.widget-drag-handle');
        handle.addEventListener('mousedown', function() { item.draggable = true; });
        handle.addEventListener('mouseup', function() { item.draggable = false; });
        item.addEventListener('dragstart', function(e) {
          pageState._dragSrcEl = item;
          e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          ul.querySelectorAll('.widget-item').forEach(function(el) { el.classList.remove('drag-over'); });
          item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', function() {
          item.classList.remove('drag-over');
        });
        item.addEventListener('drop', function(e) {
          e.preventDefault();
          item.classList.remove('drag-over');
          if (pageState._dragSrcEl && pageState._dragSrcEl !== item) {
            var items = Array.from(ul.querySelectorAll('.widget-item'));
            var srcIdx = items.indexOf(pageState._dragSrcEl);
            var tgtIdx = items.indexOf(item);
            if (srcIdx < tgtIdx) {
              ul.insertBefore(pageState._dragSrcEl, item.nextSibling);
            } else {
              ul.insertBefore(pageState._dragSrcEl, item);
            }
            syncModalConfigFromDom(ul);
            saveWidgetSettings();
          }
        });
        item.addEventListener('dragend', function() {
          ul.querySelectorAll('.widget-item').forEach(function(el) { el.classList.remove('drag-over'); });
          pageState._dragSrcEl = null;
          item.draggable = false;
        });

        // スマホ: Touch Events — ハンドルからのみドラッグ開始
        function onTouchStart(e) {
          if (!e.target.closest('.widget-drag-handle')) return;
          e.preventDefault();
          _touchDragState.srcEl = item;
          item.classList.add('drag-over');
        }
        function onTouchMove(e) {
          if (!_touchDragState.srcEl || _touchDragState.srcEl !== item) return;
          e.preventDefault();
          var touch = e.touches[0];
          var saved = item.style.display;
          item.style.display = 'none';
          var el = document.elementFromPoint(touch.clientX, touch.clientY);
          item.style.display = saved;
          if (!el) return;
          var target = el.closest('.widget-item');
          if (!target || target === item) return;
          var items = Array.from(ul.querySelectorAll('.widget-item'));
          var srcIdx = items.indexOf(item);
          var tgtIdx = items.indexOf(target);
          if (srcIdx !== tgtIdx) {
            if (srcIdx < tgtIdx) {
              ul.insertBefore(item, target.nextSibling);
            } else {
              ul.insertBefore(item, target);
            }
          }
        }
        function onTouchEnd() {
          if (!_touchDragState.srcEl) return;
          item.classList.remove('drag-over');
          _touchDragState.srcEl = null;
          syncModalConfigFromDom(ul);
          saveWidgetSettings();
        }
        item.addEventListener('touchstart', onTouchStart, { passive: false });
        item.addEventListener('touchmove', onTouchMove, { passive: false });
        item.addEventListener('touchend', onTouchEnd);
        _touchCleanups.push(function() {
          item.removeEventListener('touchstart', onTouchStart);
          item.removeEventListener('touchmove', onTouchMove);
          item.removeEventListener('touchend', onTouchEnd);
        });
      });
    }

    window.addEventListener('beforeunload', function() {
      _touchCleanups.forEach(function(fn) { fn(); });
      _touchCleanups = [];
      _summaryTouchCleanups.forEach(function(fn) { fn(); });
      _summaryTouchCleanups = [];

    function syncModalConfigFromDom(ul) {
      var newOrder = [];
      ul.querySelectorAll('.widget-item').forEach(function(li) {
        var wid = li.dataset.id;
        var entry = pageState.modalWidgetConfig.find(function(w) { return w.id === wid; });

      pageState.modalWidgetConfig = newOrder;

    function saveWidgetSettings() {
      var config = pageState.modalWidgetConfig.map(function(w) {
        return { id: w.id, visible: w.visible };
      });
      var jsonStr = JSON.stringify(config);
      fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ settings: { stats_widgets: jsonStr } })
      }).then(function(res) {
        if (!res.ok) {
          console.error('表示設定の保存に失敗しました: HTTP ' + res.status);
          showToast('設定の保存に失敗しました', 'error');
          return Promise.reject(res);
        }
        // 保存成功 → pageState に反映・統計データ再取得・再描画
        pageState.widgetConfig = pageState.modalWidgetConfig.map(function(w) {
          return { id: w.id, visible: w.visible };
        });
        destroyCharts();
        document.getElementById('content').innerHTML = '<div class="loading-spinner">読み込み中...</div>';
        var url = (pageState.dateRange.start && pageState.dateRange.end)
          ? '/api/stats?start=' + pageState.dateRange.start + '&end=' + pageState.dateRange.end
          : '/api/stats?days=' + (pageState.currentDays || 7);
        return fetch(url);
      }).then(function(dataRes) {
        if (!dataRes) return;
        if (!dataRes.ok) { return Promise.reject(dataRes); }
        return dataRes.json();
      }).then(function(data) {
        if (!data) return;
        render(data);
        loadVitalCharts().catch(function(e) { console.error('バイタル再描画エラー:', e); });
      }).catch(function(e) {
        if (e instanceof Response || e instanceof TypeError) {
          console.error('表示設定の再描画に失敗しました:', e);
          showToast('表示の更新に失敗しました', 'error');
        }
      });
    }

          item.draggable = false;
        });

        // スマホ: Touch Events — ハンドルからのみドラッグ開始
        function onTouchStart(e) {
          if (!e.target.closest('.widget-drag-handle')) return;
          e.preventDefault();
          _summaryTouchDragState.srcEl = item;
          item.classList.add('drag-over');
        }
        function onTouchMove(e) {
          if (!_summaryTouchDragState.srcEl || _summaryTouchDragState.srcEl !== item) return;
          e.preventDefault();
          var touch = e.touches[0];
          var saved = item.style.display;
          item.style.display = 'none';
          var el = document.elementFromPoint(touch.clientX, touch.clientY);
          item.style.display = saved;
          if (!el) return;
          var target = el.closest('.widget-item');
          if (!target || target === item) return;
          var items = Array.from(ul.querySelectorAll('.widget-item'));
          var srcIdx = items.indexOf(item);
          var tgtIdx = items.indexOf(target);
          if (srcIdx !== tgtIdx) {
            if (srcIdx < tgtIdx) {
              ul.insertBefore(item, target.nextSibling);
            } else {
              ul.insertBefore(item, target);
            }
          }
        }
        function onTouchEnd() {
          if (!_summaryTouchDragState.srcEl) return;
          item.classList.remove('drag-over');
          _summaryTouchDragState.srcEl = null;
          syncSummaryConfigFromDom(ul);
          saveSummarySettings();
        }
        item.addEventListener('touchstart', onTouchStart, { passive: false });
        item.addEventListener('touchmove', onTouchMove, { passive: false });
        item.addEventListener('touchend', onTouchEnd);
        _summaryTouchCleanups.push(function() {
          item.removeEventListener('touchstart', onTouchStart);
          item.removeEventListener('touchmove', onTouchMove);
          item.removeEventListener('touchend', onTouchEnd);
        });
      });
    }

    function syncSummaryConfigFromDom(ul) {
      var newOrder = [];
      ul.querySelectorAll('.widget-item').forEach(function(li) {
        var wid = li.dataset.id;
        var entry = pageState.modalSummaryConfig.find(function(w) { return w.id === wid; });
        if (entry) { newOrder.push({ id: entry.id, visible: entry.visible }); }
      });
      pageState.modalSummaryConfig = newOrder;
    }

    function saveSummarySettings() {
      var config = pageState.modalSummaryConfig.map(function(w) {
        return { id: w.id, visible: w.visible };
      });
      var jsonStr = JSON.stringify(config);
      fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ settings: { stats_summary_items: jsonStr } })
      }).then(function(res) {
        if (!res.ok) {
          console.error('サマリー設定の保存に失敗しました: HTTP ' + res.status);
          showToast('設定の保存に失敗しました', 'error');
          return Promise.reject(res);
        }
        pageState.summaryConfig = pageState.modalSummaryConfig.map(function(w) {
          return { id: w.id, visible: w.visible };
        });
        // サマリーのみ再描画（チャートは不変）
        if (pageState._lastStatsData) {
          var summaryWidget = document.querySelector('.summary-row');
          var newHtml = buildSummaryHtml(pageState._lastStatsData);
          if (summaryWidget) {
            summaryWidget.outerHTML = newHtml || '<div class="summary-row" style="display:none"></div>';
          } else {
            // サマリーウィジェットが表示中なら先頭に挿入
            var content = document.getElementById('content');
            if (newHtml && content) {
              content.insertAdjacentHTML('afterbegin', newHtml);
            }
          }
        }
      }).catch(function(e) {
        if (e instanceof Response || e instanceof TypeError) {
          console.error('サマリー設定の保存に失敗しました:', e);
          showToast('設定の保存に失敗しました', 'error');
        }
      });
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type === 'error' ? ' toast-error' : '');
      clearTimeout(t._timer);
      t._timer = setTimeout(function() { t.classList.remove('show'); }, type === 'error' ? 5000 : 3000);
    }

    load(7, null, null);
  </script>
  <script src="/static/common.js"></script>
  <script>
    initNav('stats');
    initTheme();
</script>
</body>
</html>
