<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>記録履歴</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    .period-bar { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--header-bg); flex-wrap: wrap; }
    /* 検索バー */
    .search-bar {
      padding: 8px 16px; background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .search-bar input {
      flex: 1; padding: 8px 14px; border: 1px solid var(--border);
      border-radius: 20px; font-size: 15px; outline: none; background: var(--bg);
      font-family: inherit;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      background: none; border: none; font-size: 18px;
      cursor: pointer; color: var(--text-secondary); padding: 4px 6px; line-height: 1;
    }
    .search-bar button:hover { color: var(--text-primary); }
    /* 検索結果 */
    .search-result-meta { font-size: 13px; color: var(--text-secondary); padding: 8px 4px 4px; }
    .search-date-label {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      padding: 2px 6px; background: var(--bg); border-radius: 6px;
      display: inline-block; margin-bottom: 6px;
    }
    .period-btn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; font-size: 13px; cursor: pointer; color: var(--accent);
    }
    .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .content { padding: 16px; max-width: 680px; margin: 0 auto; }
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 4px; margin-bottom: 12px;
    }
    .page-info { font-size: 13px; color: var(--text-secondary); }
    .page-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--card-bg); font-size: 13px; cursor: pointer; color: var(--accent);
    }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .day-section { margin-bottom: 20px; }
    .day-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; padding: 0 4px; }
    .day-date { font-size: 15px; font-weight: 700; }
    .day-totals { font-size: 12px; color: var(--text-secondary); }
    .day-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; margin-bottom: 8px; padding: 0 4px; flex-wrap: wrap; align-items: center; }
    .meta-item { display: flex; align-items: center; gap: 4px; }
    .meal-card { background: var(--card-bg); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); }
    .meal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .meal-type-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: color-mix(in srgb, var(--accent) 12%, var(--card-bg)); color: var(--accent); white-space: nowrap; flex-shrink: 0; }
    .meal-desc { font-size: 14px; font-weight: 600; flex: 1; }
    .meal-cal { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .meal-pfc { font-size: 12px; color: var(--text-secondary); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
    .meal-pfc span { background: var(--bg); padding: 2px 6px; border-radius: 6px; }
    .meal-notes { font-size: 11px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }
    /* 画像グリッド */
    .meal-images { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
    .meal-img-wrap { position: relative; display: inline-block; }
    .meal-img-wrap img { width: 90px; height: 90px; border-radius: 8px; object-fit: cover; display: block; }
    .img-del-btn {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%;
      width: 22px; height: 22px; font-size: 12px; cursor: pointer; line-height: 22px; text-align: center; padding: 0;
    }
    /* アクションボタン行 */
    .card-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
    .action-btn {
      padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; font-size: 12px; cursor: pointer; color: var(--text-secondary);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .action-btn:hover { background: var(--bg); }
    .action-btn.danger { color: var(--danger); border-color: var(--danger); }
    .action-btn.danger:hover { background: var(--bg); }
    .action-btn.photo { color: var(--accent); border-color: var(--accent); }
    .action-btn.photo:hover { background: var(--bg); }
    /* カロリーバー */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 15px; }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .calorie-bar-wrap { margin: 4px 0 8px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .calorie-bar { height: 100%; border-radius: 2px; background: var(--success); transition: width 0.3s; }
    .calorie-bar.over { background: var(--danger); }
    .period-shift-btn {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--accent); font-size: 13px; cursor: pointer;
    }
    .period-shift-btn:disabled { color: var(--text-secondary); opacity: 0.5; cursor: default; }
    /* モーダル固有スタイル */
    .modal-row input[readonly], .modal-row select[disabled] {
      opacity: 0.55; cursor: default;
    }
    .field-error { font-size: 12px; color: var(--danger); margin-top: 3px; display: none; }
    .field-error.show { display: block; }
    /* ローディングスピナー（保存中） */
    .saving-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      z-index: 200; display: flex; align-items: center; justify-content: center;
    }
    .saving-box {
      background: var(--card-bg); border-radius: 12px; padding: 20px 32px;
      font-size: 15px;
    }
    @media (max-width: 480px) {
      .day-totals { font-size: 11px; word-break: keep-all; line-height: 1.4; }
      .day-meta { flex-wrap: wrap; gap: 4px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">📋 記録履歴</div>
    <div class="header-nav" id="headerNav"></div>
  </div>
  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod(7, this)">直近7日</button>
    <button class="period-btn" onclick="setPeriod(30, this)">直近30日</button>
    <button class="period-btn" id="customBtn" onclick="openDateModal()">📅 期間指定</button>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="period-shift-btn" id="prevBtn" onclick="shiftPeriod(-1)">◀ 前</button>
      <button class="period-shift-btn" id="nextBtn" onclick="shiftPeriod(1)" disabled>次 ▶</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 食事を検索..." oninput="debounceSearch()" />
    <button id="searchClear" style="display:none" onclick="clearSearch()" title="クリア">✕</button>
  </div>
  <div class="content" id="content">
    <div class="loading">読み込み中...</div>
  </div>

  <!-- ── 期間指定モーダル ── -->
  <div class="modal-overlay" id="dateModal" style="display:none">
    <div class="modal-box">
      <div class="modal-title">📅 期間を指定</div>
      <div class="modal-row">
        <label>開始日</label>
        <input type="date" id="startDate" />
      </div>
      <div class="modal-row">
        <label>終了日</label>
        <input type="date" id="endDate" />
      </div>
      <div class="modal-actions">
        <button onclick="closeDateModal()">キャンセル</button>
        <button class="primary" onclick="applyDateRange()">適用</button>
      </div>
    </div>
  </div>

  <!-- ── 食事編集モーダル ── -->
  <div class="modal-overlay" id="mealModal" style="display:none">
    <div class="modal-box">
      <div class="modal-title">✏️ 食事記録を編集</div>
      <input type="hidden" id="editMealId" />
      <div class="modal-row">
        <label>食事日 <span style="color:var(--danger)">*</span></label>
        <input type="date" id="editMealDate" />
        <div class="field-error" id="err-meal-date">日付を入力してください</div>
      </div>
      <div class="modal-row">
        <label>食事区分 <span style="color:var(--danger)">*</span></label>
        <select id="editMealType">
          <option value="breakfast">朝食</option>
          <option value="lunch">昼食</option>
          <option value="dinner">夕食</option>
          <option value="snack">間食</option>
          <option value="late_night">夜食</option>
        </select>
      </div>
      <div class="modal-row">
        <label>内容 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="editMealDesc" maxlength="200" placeholder="例: ご飯、味噌汁、焼き魚" />
        <div class="field-error" id="err-meal-desc">内容を入力してください</div>
      </div>
      <div class="modal-row">
        <label>カロリー (kcal)</label>
        <input type="number" id="editMealCal" min="0" max="9999" step="1" placeholder="例: 600" />
        <div class="field-error" id="err-meal-cal">0〜9999の整数を入力してください</div>
      </div>
      <div class="modal-row">
        <label>タンパク質 (g)</label>
        <input type="number" id="editMealProtein" min="0" max="999.9" step="0.1" placeholder="例: 20.5" />
        <div class="field-error" id="err-meal-protein">0〜999.9の数値を入力してください</div>
      </div>
      <div class="modal-row">
        <label>脂質 (g)</label>
        <input type="number" id="editMealFat" min="0" max="999.9" step="0.1" placeholder="例: 15.0" />
        <div class="field-error" id="err-meal-fat">0〜999.9の数値を入力してください</div>
      </div>
      <div class="modal-row">
        <label>炭水化物 (g)</label>
        <input type="number" id="editMealCarbs" min="0" max="999.9" step="0.1" placeholder="例: 80.0" />
        <div class="field-error" id="err-meal-carbs">0〜999.9の数値を入力してください</div>
      </div>
      <div class="modal-row">
        <label>食塩相当量 (g)</label>
        <input type="number" id="editMealSodium" min="0" max="99.99" step="0.01" placeholder="例: 2.50" />
        <div class="field-error" id="err-meal-sodium">0〜99.99の数値を入力してください</div>
      </div>
      <div class="modal-row">
        <label>メモ</label>
        <input type="text" id="editMealNotes" maxlength="200" />
      </div>
      <div class="modal-actions">
        <button onclick="closeMealModal()">キャンセル</button>
        <button class="primary" onclick="saveMeal()">保存</button>
      </div>
    </div>
  </div>

  <!-- ── 体重編集モーダル ── -->
  <div class="modal-overlay" id="weightModal" style="display:none">
    <div class="modal-box">
      <div class="modal-title">✏️ 体重を編集</div>
      <input type="hidden" id="editWeightId" />
      <div class="modal-row">
        <label>日付</label>
        <input type="text" id="editWeightDate" readonly />
      </div>
      <div class="modal-row">
        <label>時間帯</label>
        <input type="text" id="editWeightTimeLabel" readonly />
      </div>
      <div class="modal-row">
        <label>体重 (kg) <span style="color:var(--danger)">*</span></label>
        <input type="number" id="editWeightKg" min="20" max="200" step="0.1" placeholder="例: 65.3" />
        <div class="field-error" id="err-weight-kg">20.0〜200.0 kg の数値を入力してください</div>
      </div>
      <div class="modal-actions">
        <button onclick="closeWeightModal()">キャンセル</button>
        <button class="primary" onclick="saveWeight()">保存</button>
      </div>
    </div>
  </div>

  <!-- ── 歩数編集モーダル ── -->
  <div class="modal-overlay" id="stepsModal" style="display:none">
    <div class="modal-box">
      <div class="modal-title">✏️ 歩数を編集</div>
      <input type="hidden" id="editStepsId" />
      <div class="modal-row">
        <label>日付</label>
        <input type="text" id="editStepsDate" readonly />
      </div>
      <div class="modal-row">
        <label>歩数 <span style="color:var(--danger)">*</span></label>
        <input type="number" id="editStepsVal" min="0" max="99999" step="1" placeholder="例: 8000" />
        <div class="field-error" id="err-steps-val">0〜99999の整数を入力してください</div>
      </div>
      <div class="modal-actions">
        <button onclick="closeStepsModal()">キャンセル</button>
        <button class="primary" onclick="saveSteps()">保存</button>
      </div>
    </div>
  </div>

  <!-- ── 保存中オーバーレイ ── -->
  <div class="saving-overlay" id="savingOverlay" style="display:none">
    <div class="saving-box">保存中...</div>
  </div>

  <!-- 画像アップロード用隠しinput -->
  <input type="file" id="imageFileInput" accept="image/*" style="display:none" />

  <script>
    const MEAL_TYPE_JA = { breakfast: '朝食', lunch: '昼食', dinner: '夕食', snack: '間食', late_night: '夜食' };
    const TIME_OF_DAY_JA = { morning: '朝', evening: '夜' };
    const PAGE_SIZE = 10;
    const pageState = {
      calorieGoal: 1500,
      allDays: [],
      currentPage: 0,
      currentPeriod: { days: 7, start: null, end: null },
    };

    // ── データ取得 ─────────────────────────────────────────────────────────────
    async function load(days, start, end) {
      pageState.currentPeriod = { days, start, end };
      document.getElementById('content').innerHTML = '<div class="loading">読み込み中...</div>';
      const url = start && end ? `/api/history?start=${start}&end=${end}` : `/api/history?days=${days}`;
      const statsUrl = start && end ? `/api/stats?start=${start}&end=${end}` : `/api/stats?days=${days}`;
      try {
        const [histRes, statsRes] = await Promise.all([fetch(url), fetch(statsUrl)]);
        if (histRes.status === 401) { location.href = '/'; return; }
        if (!histRes.ok) throw histRes;
        pageState.allDays = await histRes.json();
        const stats = await statsRes.json();
        pageState.calorieGoal = stats.calories_goal || 1500;
        pageState.currentPage = 0;
        renderPage();
      } catch(e) {
        handleFetchError(document.getElementById('content'), e);
      }
    }

    function reload() {
      load(pageState.currentPeriod.days, pageState.currentPeriod.start, pageState.currentPeriod.end);
    }

    // ── ページ描画 ─────────────────────────────────────────────────────────────
    function renderPage() {
      const content = document.getElementById('content');
      if (!pageState.allDays.length) {
        content.innerHTML = '<div class="empty">この期間に記録はありません</div>';
        return;
      }
      const totalPages = Math.ceil(pageState.allDays.length / PAGE_SIZE);
      const start = pageState.currentPage * PAGE_SIZE;
      const pageDays = pageState.allDays.slice(start, start + PAGE_SIZE);
      const paginationHtml = totalPages > 1 ? `
        <div class="pagination">
          <button class="page-btn" onclick="changePage(-1)" ${pageState.currentPage === 0 ? 'disabled' : ''}>← 前へ</button>
          <span class="page-info">${pageState.currentPage + 1} / ${totalPages}ページ（全${pageState.allDays.length}日）</span>
          <button class="page-btn" onclick="changePage(1)" ${pageState.currentPage >= totalPages - 1 ? 'disabled' : ''}>次へ →</button>
        </div>` : '';
      content.innerHTML = paginationHtml + pageDays.map(d => renderDay(d)).join('') + paginationHtml;
    }

    function changePage(delta) {
      const totalPages = Math.ceil(pageState.allDays.length / PAGE_SIZE);
      pageState.currentPage = Math.max(0, Math.min(totalPages - 1, pageState.currentPage + delta));
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 1日レンダリング ────────────────────────────────────────────────────────
    function renderDay(day) {
      const dateObj = new Date(day.date + 'T00:00:00');
      const weekdays = ['日','月','火','水','木','金','土'];
      const label = `${dateObj.getMonth()+1}/${dateObj.getDate()}（${weekdays[dateObj.getDay()]}）`;
      const t = day.totals;
      const pct = pageState.calorieGoal > 0 ? Math.min((t.calories / pageState.calorieGoal) * 100, 100) : 0;
      const over = t.calories > pageState.calorieGoal;

      // 体重メタ（朝・夜を常に表示）
      let weightHtml = '';
      for (const tod of ['morning', 'evening']) {
        const label_ja = TIME_OF_DAY_JA[tod] || tod;
        const wdata = day.weight ? day.weight[tod] : null;
        if (wdata) {
          const wid = wdata.id;
          const wkg = wdata.weight_kg;
          weightHtml += `
            <span class="meta-item">
              ⚖️ ${label_ja} ${wkg}kg
              <button class="action-btn" style="padding:2px 6px;font-size:11px" onclick="openWeightModal(${wid},'${day.date}','${tod}',${wkg})" title="編集">✏️</button>
              <button class="action-btn danger" style="padding:2px 6px;font-size:11px" onclick="confirmDeleteWeight(${wid})" title="削除">🗑️</button>
            </span>`;
        } else {
          weightHtml += `
            <span class="meta-item" style="color:var(--text-secondary)">
              ⚖️ ${label_ja} <span style="font-style:italic">未入力</span>
              <button class="action-btn" style="padding:2px 6px;font-size:11px" onclick="openWeightModal(null,'${day.date}','${tod}',null)" title="入力">✏️</button>
            </span>`;
        }
      }

      // 歩数メタ（未入力でも表示）
      let stepsHtml = '';
      if (day.steps != null) {
        stepsHtml = `
          <span class="meta-item">
            👟 ${day.steps.toLocaleString()}歩
            <button class="action-btn" style="padding:2px 6px;font-size:11px" onclick="openStepsModal(${day.steps_id},'${day.date}',${day.steps})" title="編集">✏️</button>
            <button class="action-btn danger" style="padding:2px 6px;font-size:11px" onclick="confirmDeleteSteps(${day.steps_id})" title="削除">🗑️</button>
          </span>`;
      } else {
        stepsHtml = `
          <span class="meta-item" style="color:var(--text-secondary)">
            👟 <span style="font-style:italic">未入力</span>
            <button class="action-btn" style="padding:2px 6px;font-size:11px" onclick="openStepsModal(null,'${day.date}',null)" title="入力">✏️</button>
          </span>`;
      }

      const mealsHtml = day.meals.length
        ? day.meals.map(m => renderMeal(m)).join('')
        : '<div class="meal-card" style="color:var(--text-secondary);font-size:13px">記録なし</div>';

      const remaining = pageState.calorieGoal - t.calories;
      const remainingText = remaining >= 0
        ? `<span style="color:var(--text-secondary);font-size:11px">残り ${remaining}kcal</span>`
        : `<span style="color:var(--danger);font-size:11px">+${Math.abs(remaining)}kcal超過</span>`;

      return `
        <div class="day-section">
          <div class="day-header">
            <span class="day-date">${label}</span>
            <span class="day-totals">${t.calories} kcal / P:${t.protein}g F:${t.fat}g C:${t.carbs}g 塩:${t.sodium}g</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="calorie-bar-wrap" style="flex:1"><div class="calorie-bar ${over ? 'over' : ''}" style="width:${pct}%"></div></div>
            ${remainingText}
          </div>
          <div class="day-meta">${weightHtml}${stepsHtml}</div>
          ${mealsHtml}
        </div>`;
    }

    function renderMeal(m) {
      const type = MEAL_TYPE_JA[m.meal_type] || m.meal_type;
      const cal = m.calories != null ? `${m.calories} kcal` : '—';
      const pfc = [];
      if (m.protein != null) pfc.push(`<span>P: ${m.protein}g</span>`);
      if (m.fat != null)     pfc.push(`<span>F: ${m.fat}g</span>`);
      if (m.carbs != null)   pfc.push(`<span>C: ${m.carbs}g</span>`);
      if (m.sodium != null)  pfc.push(`<span>塩: ${m.sodium}g</span>`);

      // 画像（複数対応）
      let imagesHtml = '';
      if (m.image_count > 0) {
        // 画像は動的に読み込む。data属性に meal_id を持たせ、DOMに挿入後に loadMealImages() で取得
        imagesHtml = `<div class="meal-images" id="imgs-${m.id}" data-meal-id="${m.id}" data-loaded="false"></div>`;
      }

      return `
        <div class="meal-card" id="meal-card-${m.id}">
          <div class="meal-header">
            <span class="meal-type-badge">${type}</span>
            <span class="meal-desc">${escHtml(m.description)}</span>
            <span class="meal-cal">${cal}</span>
          </div>
          ${pfc.length ? `<div class="meal-pfc">${pfc.join('')}</div>` : ''}
          ${m.notes ? `<div class="meal-notes">${escHtml(m.notes)}</div>` : ''}
          ${imagesHtml}
          <div class="card-actions">
            <button class="action-btn" onclick="openMealModal(${m.id})">✏️ 編集</button>
            <button class="action-btn danger" onclick="confirmDeleteMeal(${m.id})">🗑️ 削除</button>
            <button class="action-btn photo" onclick="triggerImageUpload(${m.id})">📷 写真追加</button>
          </div>
        </div>`;
    }

    // ── 画像遅延読み込み (IntersectionObserver) ────────────────────────────────
    let _imgObserver = null;
    let _mutObserver = null;

    if (_imgObserver) _imgObserver.disconnect();
    _imgObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          if (el.dataset.loaded === 'false') {
            loadMealImages(el);
            el.dataset.loaded = 'true';
            _imgObserver.unobserve(el);
          }
        }
      });
    }, { rootMargin: '200px' });

    function observeImageContainers() {
      document.querySelectorAll('.meal-images[data-loaded="false"]').forEach(el => {
        _imgObserver.observe(el);
      });
    }

    async function loadMealImages(container) {
      const mealId = container.dataset.mealId;
      try {
        const res = await fetch(`/api/meals/${mealId}/images`);
        if (!res.ok) return;
        const images = await res.json();
        container.innerHTML = images.map(img => `
          <div class="meal-img-wrap" id="imgwrap-${img.id}">
            <img src="/api/images/${img.id}" loading="lazy" alt="食事画像" />
            <button class="img-del-btn" onclick="confirmDeleteImage(${img.id})" title="削除">✕</button>
          </div>`).join('');
      } catch(e) { /* 無視 */ }
    }

    // ── 画像アップロード ────────────────────────────────────────────────────────
    let uploadTargetMealId = null;

    function triggerImageUpload(mealId) {
      uploadTargetMealId = mealId;
      const inp = document.getElementById('imageFileInput');
      inp.value = '';
      inp.click();
    }

    document.getElementById('imageFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !uploadTargetMealId) return;
      showSaving();
      try {
        const b64 = await fileToBase64(file);
        const res = await fetch(`/api/meals/${uploadTargetMealId}/images`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_b64: b64 }),
        });
        if (!res.ok) throw new Error('upload failed');
        // 画像コンテナを再読み込み
        const container = document.getElementById(`imgs-${uploadTargetMealId}`);
        if (container) {
          container.dataset.loaded = 'true';
          await loadMealImages(container);
        } else {
          // meal-card内に画像コンテナがなかった場合（image_count=0だった）、カードを再描画
          reload();
        }
      } catch(e) {
        alert('画像のアップロードに失敗しました');
      } finally {
        hideSaving();
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ── 画像削除 ───────────────────────────────────────────────────────────────
    function confirmDeleteImage(imageId) {
      if (!confirm('この写真を削除しますか？')) return;
      deleteImage(imageId);
    }

    async function deleteImage(imageId) {
      showSaving();
      try {
        const res = await fetch(`/api/images/${imageId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        const wrap = document.getElementById(`imgwrap-${imageId}`);
        if (wrap) wrap.remove();
      } catch(e) {
        alert('削除に失敗しました');
      } finally {
        hideSaving();
      }
    }

    // ── 食事編集モーダル ───────────────────────────────────────────────────────
    async function openMealModal(mealId) {
      // 全データから該当meal を探す
      let meal = null;
      for (const day of pageState.allDays) {
        meal = day.meals.find(m => m.id === mealId);
        if (meal) break;
      }
      if (!meal) { alert('データが見つかりません'); return; }

      document.getElementById('editMealId').value = mealId;
      // meal_date は meals に含まれていないので day から取得
      let mealDate = '';
      for (const day of pageState.allDays) {
        if (day.meals.find(m => m.id === mealId)) { mealDate = day.date; break; }
      }
      document.getElementById('editMealDate').value = mealDate;
      document.getElementById('editMealType').value = meal.meal_type;
      document.getElementById('editMealDesc').value = meal.description;
      document.getElementById('editMealCal').value = meal.calories ?? '';
      document.getElementById('editMealProtein').value = meal.protein ?? '';
      document.getElementById('editMealFat').value = meal.fat ?? '';
      document.getElementById('editMealCarbs').value = meal.carbs ?? '';
      document.getElementById('editMealSodium').value = meal.sodium ?? '';
      document.getElementById('editMealNotes').value = meal.notes ?? '';
      clearMealErrors();
      document.getElementById('mealModal').style.display = 'flex';
    }

    function closeMealModal() {
      document.getElementById('mealModal').style.display = 'none';
    }

    function clearMealErrors() {
      ['meal-date','meal-desc','meal-cal','meal-protein','meal-fat','meal-carbs','meal-sodium'].forEach(id => {
        document.getElementById('err-' + id).classList.remove('show');
      });
    }

    async function saveMeal() {
      clearMealErrors();
      let valid = true;

      const mealId = parseInt(document.getElementById('editMealId').value);
      const mealDate = document.getElementById('editMealDate').value;
      const mealType = document.getElementById('editMealType').value;
      const desc = document.getElementById('editMealDesc').value.trim();
      const calStr = document.getElementById('editMealCal').value;
      const proteinStr = document.getElementById('editMealProtein').value;
      const fatStr = document.getElementById('editMealFat').value;
      const carbsStr = document.getElementById('editMealCarbs').value;
      const sodiumStr = document.getElementById('editMealSodium').value;
      const notes = document.getElementById('editMealNotes').value.trim();

      if (!mealDate) { document.getElementById('err-meal-date').classList.add('show'); valid = false; }
      if (!desc) { document.getElementById('err-meal-desc').classList.add('show'); valid = false; }

      const calories = calStr !== '' ? parseInt(calStr) : null;
      if (calStr !== '' && (isNaN(calories) || calories < 0 || calories > 9999 || String(calories) !== String(calStr.trim()))) {
        document.getElementById('err-meal-cal').classList.add('show'); valid = false;
      }
      const protein = proteinStr !== '' ? parseFloat(proteinStr) : null;
      if (proteinStr !== '' && (isNaN(protein) || protein < 0 || protein > 999.9)) {
        document.getElementById('err-meal-protein').classList.add('show'); valid = false;
      }
      const fat = fatStr !== '' ? parseFloat(fatStr) : null;
      if (fatStr !== '' && (isNaN(fat) || fat < 0 || fat > 999.9)) {
        document.getElementById('err-meal-fat').classList.add('show'); valid = false;
      }
      const carbs = carbsStr !== '' ? parseFloat(carbsStr) : null;
      if (carbsStr !== '' && (isNaN(carbs) || carbs < 0 || carbs > 999.9)) {
        document.getElementById('err-meal-carbs').classList.add('show'); valid = false;
      }
      const sodium = sodiumStr !== '' ? parseFloat(sodiumStr) : null;
      if (sodiumStr !== '' && (isNaN(sodium) || sodium < 0 || sodium > 99.99)) {
        document.getElementById('err-meal-sodium').classList.add('show'); valid = false;
      }

      if (!valid) return;

      closeMealModal();
      showSaving();
      try {
        const res = await fetch(`/api/meals/${mealId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ meal_date: mealDate, meal_type: mealType, description: desc,
            calories, protein, fat, carbs, sodium, notes: notes || null }),
        });
        if (!res.ok) throw new Error();
        reload();
      } catch(e) {
        alert('保存に失敗しました');
      } finally {
        hideSaving();
      }
    }

    // ── 食事削除 ───────────────────────────────────────────────────────────────
    function confirmDeleteMeal(mealId) {
      if (!confirm('この食事記録を削除しますか？\nこの操作は元に戻せません。')) return;

    // ── 体重編集モーダル ───────────────────────────────────────────────────────
    let _weightTod = null;  // time_of_day を保持（新規作成時に使用）

    function openWeightModal(weightId, date, tod, weightKg) {

            method: 'PUT',

            body: JSON.stringify({ weight_kg: kg }),

        } else {
          res = await fetch('/api/weight', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

    // ── 歩数編集モーダル ───────────────────────────────────────────────────────
    function openStepsModal(stepsId, date, steps) {
      document.getElementById('editStepsId').value = stepsId ?? '';
      document.getElementById('editStepsDate').value = date;
      document.getElementById('editStepsVal').value = steps ?? '';
      document.getElementById('err-steps-val').classList.remove('show');
      document.getElementById('stepsModal').querySelector('.modal-title').textContent =
        stepsId ? '✏️ 歩数を編集' : '➕ 歩数を入力';
      document.getElementById('stepsModal').style.display = 'flex';
    }

    async function saveSteps() {
      const stepsIdStr = document.getElementById('editStepsId').value;
      const stepsId = stepsIdStr !== '' ? parseInt(stepsIdStr) : null;
      const date = document.getElementById('editStepsDate').value;
      const valStr = document.getElementById('editStepsVal').value;
      const steps = parseInt(valStr);

      closeStepsModal();

      try {
        let res;

            body: JSON.stringify({ steps }),

        } else {
          res = await fetch('/api/steps', {

            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ log_date: date, steps }),
          });
        }
        if (!res.ok) throw new Error();
        reload();
      } catch(e) {

    }

    function confirmDeleteSteps(stepsId) {

      deleteSteps(stepsId);
    }

      showSaving();
      try {
        const res = await fetch(`/api/steps/${stepsId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        reload();
      } catch(e) {
        alert('削除に失敗しました');
      } finally {

      }
    }

    // ── キーワード検索 ─────────────────────────────────────────────────────────
    let _searchTimer = null;

    function debounceSearch() {
      clearTimeout(_searchTimer);
      const q = document.getElementById('searchInput').value;
      document.getElementById('searchClear').style.display = q ? 'inline' : 'none';
      _searchTimer = setTimeout(function() { searchMeals(q); }, 300);
    }

    async function searchMeals(q) {
      const content = document.getElementById('content');
      if (!q.trim()) {
        renderPage();
        return;
      }
      content.innerHTML = '<div class="loading">検索中...</div>';
      try {
        const res = await fetch('/api/history/search?q=' + encodeURIComponent(q.trim()));
        if (!res.ok) throw res;
        const meals = await res.json();
        if (!meals.length) {
          content.innerHTML = '<div class="empty">「' + escHtml(q) + '」に一致する記録はありません</div>';
          return;
        }
        const countHtml = '<div class="search-result-meta">' + meals.length + '件 ヒット</div>';
        const cardsHtml = meals.map(function(m) {
          const dateLabel = '<div class="search-date-label">' + escHtml(m.meal_date) + '（' + (MEAL_TYPE_JA[m.meal_type] || m.meal_type) + '）</div>';
          return dateLabel + renderMeal(m);
        }).join('');
        content.innerHTML = countHtml + cardsHtml;
      } catch(e) {
        handleFetchError(content, e);
      }
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').style.display = 'none';
      renderPage();
    }

    // ── 期間ボタン ──────────────────────────────────────────────────────────────
    function setPeriod(days, btn) {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      load(days, null, null);
      updateShiftButtons();
    }

    // ── 前後ナビゲーション ──────────────────────────────────────────────────────
    function shiftPeriod(direction) {
      var cp = pageState.currentPeriod;
      var shiftDays = cp.days || 7;
      var today = new Date();
      today.setHours(0,0,0,0);
      var todayStr = today.toISOString().slice(0, 10);

      var newEnd, newStart;
      if (cp.start && cp.end) {
        // カスタム期間の場合
        var s = new Date(cp.start + 'T00:00:00');
        var e = new Date(cp.end + 'T00:00:00');
        shiftDays = Math.round((e - s) / 86400000) + 1;
        var ms = shiftDays * 86400000 * direction;
        newStart = new Date(s.getTime() + ms);
        newEnd = new Date(e.getTime() + ms);
      } else {
        // プリセット期間（直近N日）の場合
        // 現在表示中の最古日を算出
        var baseEnd = new Date();
        baseEnd.setHours(0,0,0,0);
        // 現在の表示の実効end/startを逆算
        if (cp._shiftedEnd) {
          baseEnd = new Date(cp._shiftedEnd + 'T00:00:00');
        }
        newEnd = new Date(baseEnd.getTime() + shiftDays * 86400000 * direction);
        newStart = new Date(newEnd.getTime() - (shiftDays - 1) * 86400000);
      }

      // 未来の日付には進めない
      if (newStart > today) return;
      if (newEnd > today) newEnd = today;

      var startStr = newStart.toISOString().slice(0, 10);
      var endStr = newEnd.toISOString().slice(0, 10);

      // プリセットのアクティブ状態を解除してカスタム表示
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('customBtn').classList.add('active');
      document.getElementById('customBtn').textContent =
        '\u{1f4c5} ' + startStr.slice(5).replace('-','/') + ' \u301c ' + endStr.slice(5).replace('-','/');

      pageState.currentPeriod._shiftedEnd = endStr;
      load(null, startStr, endStr);
      updateShiftButtons();
    }

    function updateShiftButtons() {
      var today = new Date();
      today.setHours(0,0,0,0);
      var todayStr = today.toISOString().slice(0, 10);
      var cp = pageState.currentPeriod;
      // 「次」ボタン：endが今日以降なら無効
      var endStr = cp.end || cp._shiftedEnd || todayStr;
      document.getElementById('nextBtn').disabled = (endStr >= todayStr);
    }

    // ── 期間指定モーダル ───────────────────────────────────────────────────────
    function openDateModal() {
      const today = new Date().toISOString().slice(0, 10);
      const oneMonthAgo = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
      document.getElementById('startDate').value = oneMonthAgo;
      document.getElementById('endDate').value = today;
      document.getElementById('dateModal').style.display = 'flex';
    }

    function closeDateModal() {
      document.getElementById('dateModal').style.display = 'none';
    }

    function applyDateRange() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      if (!start || !end) { alert('開始日と終了日を入力してください'); return; }
      if (start > end) { alert('開始日は終了日より前にしてください'); return; }
      closeDateModal();
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('customBtn').classList.add('active');
      document.getElementById('customBtn').textContent =
        `📅 ${start.slice(5).replace('-','/')} 〜 ${end.slice(5).replace('-','/')}`;
      load(null, start, end);
      updateShiftButtons();
    }

    // ── 保存中オーバーレイ ─────────────────────────────────────────────────────
    function showSaving() { document.getElementById('savingOverlay').style.display = 'flex'; }
    function hideSaving() { document.getElementById('savingOverlay').style.display = 'none'; }

    // ── renderPage後に画像Observerをセット ────────────────────────────────────
    const _origRenderPage = renderPage;
    // renderPage呼び出し後にObserver登録（MutationObserverで監視）
    if (_mutObserver) _mutObserver.disconnect();
    _mutObserver = new MutationObserver(() => observeImageContainers());
    _mutObserver.observe(document.getElementById('content'), { childList: true, subtree: true });

    // ── ページ離脱時のクリーンアップ ──────────────────────────────────────────
    window.addEventListener('beforeunload', function() {
      if (_imgObserver) _imgObserver.disconnect();
      if (_mutObserver) _mutObserver.disconnect();
    });

    load(7, null, null);
  </script>
