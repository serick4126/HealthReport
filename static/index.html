<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>食事記録アシスタント</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    /* index固有: bodyをflex列レイアウト・スクロール禁止 */
    body {
      height: 100dvh;
      min-height: unset;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── メッセージエリア ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 100%;
    }
    .message.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--bubble-user);
      color: var(--bubble-user-text);
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--bubble-ai);
      color: var(--bubble-ai-text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* Markdownスタイル（aiバブル内） */
    .message.ai .bubble p { margin: 0 0 6px; }
    .message.ai .bubble p:last-child { margin-bottom: 0; }
    .message.ai .bubble ul,
    .message.ai .bubble ol { padding-left: 20px; margin: 4px 0; }
    .message.ai .bubble li { margin-bottom: 2px; }
    .message.ai .bubble strong { font-weight: 700; }
    .message.ai .bubble code {
      background: var(--bg);
      border-radius: 4px;
      padding: 1px 4px;
      font-size: 14px;
    }

    /* 選択肢ボタン */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }
    .choices-question {
      font-size: 15px;
      font-weight: 600;
      color: var(--bubble-ai-text);
      margin-bottom: 4px;
    }
    .choice-btn {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card-bg);
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.4;
      transition: background 0.1s, border-color 0.1s;
      color: var(--bubble-ai-text);
      width: 100%;
    }
    .choice-btn:active,
    .choice-btn:hover { background: var(--bg); border-color: var(--accent); }
    .choice-btn.no-match {
      color: var(--text-secondary);
      border-style: dashed;
    }

    /* 画像プレビュー */
    .image-preview {
      display: none;
      gap: 8px;
      padding: 8px 16px;
      background: var(--input-bg);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .image-preview.has-items { display: flex; }
    .preview-item {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .preview-item img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .preview-item .remove {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 20px;
      height: 20px;
      background: var(--error-color);
      color: #fff;
      border-radius: 50%;
      border: 2px solid var(--card-bg);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* 入力エリア */
    .input-area {
      background: var(--input-bg);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .attach-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .attach-btn:active { background: var(--toggle-off); }

    .text-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 16px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 36px;
      line-height: 1.45;
      font-family: inherit;
      background: var(--bg);
      color: var(--text-primary);
      overflow-y: auto;
    }
    .text-input:focus { border-color: var(--accent); }

    .send-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .send-btn:disabled { background: var(--border); cursor: default; }
    .send-btn:not(:disabled):active { background: color-mix(in srgb, var(--accent) 80%, #000); }
    .send-btn .spinner-sm {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* タイピングインジケーター */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 4px 4px;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ユーザーメッセージ内の画像 */
    .user-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 12px;
      display: block;
      margin-bottom: 4px;
    }

    /* エラーメッセージ */
    .error-msg {
      text-align: center;
      color: var(--error-color);
      font-size: 13px;
      padding: 6px;
    }

    /* 取り消しボタン */
    .undo-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: opacity 0.5s;
      font-family: inherit;
    }
    .undo-btn:hover { background: var(--bg); color: var(--accent); }
    .undo-btn.fading { opacity: 0; pointer-events: none; }

    /* ── ログイン画面 ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 36px 32px;
      width: min(340px, 90vw);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .login-box h2 { font-size: 22px; margin-bottom: 6px; }
    .login-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .login-input {
      width: 100%;
      padding: 13px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 18px;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 6px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg);
      color: var(--text-primary);
    }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-btn:active { background: color-mix(in srgb, var(--accent) 80%, #000); }
    .login-error { color: var(--error-color); font-size: 13px; margin-top: 10px; height: 18px; }

    /* ── ダッシュボードバー ── */
    .dashboard {
      background: var(--input-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
    }
    .dash-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      cursor: pointer;
      user-select: none;
      gap: 8px;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      font: inherit;
      color: inherit;
    }
    .dash-toggle-row:active { background: var(--bg); }
    .dash-date { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
    .dash-compact { font-size: 12px; color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dash-arrow { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }

    .dash-body { padding: 0 14px 8px; }

    /* カロリー行 */
    .dash-cal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
    .dash-cal-text { font-size: 13px; font-weight: 600; white-space: nowrap; }
    .dash-bar-wrap { flex: 1; min-width: 60px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .dash-bar { height: 100%; border-radius: 3px; background: var(--success); transition: width 0.3s; }
    .dash-bar.over { background: var(--error-color); }
    .dash-pct { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

    /* 体重・歩数行 */
    .dash-meta-row { font-size: 12px; color: var(--text-primary); margin-bottom: 5px; display: flex; gap: 12px; flex-wrap: wrap; }
    .dash-meta-item { white-space: nowrap; }

    /* 食事区分行 */
    .dash-meals-row { font-size: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .dash-meal-chip { white-space: nowrap; }

    @media (max-width: 480px) {
      .dash-toggle-row { padding: 5px 10px; }
      .dash-body { padding: 0 10px 6px; }
      .bubble { max-width: 88%; }
      .toast { top: 12px; font-size: 13px; padding: 8px 16px; }
    }

    /* ── クイックパレット ── */
    .quick-palette {
      background: var(--input-bg);
      border-bottom: 1px solid var(--border);
      padding: 5px 12px;
      flex-shrink: 0;
    }
    .qp-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      max-height: 144px; /* 4行分 (約31px × 4 + gap × 3) */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .qp-chips::-webkit-scrollbar { width: 4px; }
    .qp-chips::-webkit-scrollbar-thumb {
      background: var(--text-secondary);
      border-radius: 2px;
    }
    .qp-chip {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      font-family: inherit;
      max-width: min(200px, 42vw);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .qp-chip:active { background: var(--toggle-off); }
    .qp-chip.meal { border-color: var(--text-secondary); background: var(--bg); font-weight: 600; }
    .qp-chip.fav { border-color: #f5a623; background: var(--bg); }
    .qp-chip.action { background: var(--accent); color: #fff; border-color: var(--accent); }
    .qp-chip.action:active { opacity: 0.8; }

    /* ── 体重・歩数クイック入力モーダル ── */
    .qp-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .qp-modal-box {
      background: var(--card-bg); border-radius: 16px; padding: 24px 20px;
      width: min(320px, 90vw); box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .qp-modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .qp-modal-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .qp-modal-row label { font-size: 14px; color: var(--text-secondary); flex-shrink: 0; min-width: 60px; }
    .qp-modal-row input[type=number],
    .qp-modal-row select {
      flex: 1; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 16px; outline: none;
      background: var(--bg); color: var(--text-primary);
    }
    .qp-modal-row input[type=number]:focus,
    .qp-modal-row select:focus { border-color: var(--accent); }
    .qp-modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .qp-modal-actions button {
      flex: 1; padding: 11px; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .qp-modal-actions .cancel { background: var(--toggle-off); color: var(--text-primary); }
    .qp-modal-actions .submit { background: var(--accent); color: #fff; }
    .qp-modal-actions .submit:active { opacity: 0.8; }

    /* ── トースト通知 ── */
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: var(--bg);
      padding: 10px 20px; border-radius: 20px;
      font-size: 14px; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: normal; text-align: center; max-width: 90vw; z-index: 300;
    }
    .toast.show { opacity: 1; }
    .toast.toast-error { background: var(--danger, #ff3b30); color: #fff; }

    /* ── BMIウィジェット ── */
    .bmi-widget {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: 12px; padding: 5px 8px; margin-top: 4px;
      background: var(--toggle-off); border-radius: 8px;
    }
    .bmi-widget .bmi-lbl { color: var(--text-secondary); }
    .bmi-widget .bmi-val { font-weight: 700; }
    .bmi-widget .bmi-sep { color: var(--border); margin: 0 2px; }
    .bmi-widget .bmi-hint { color: var(--text-secondary); font-style: italic; font-size: 11px; }
  </style>
<script>(function(){try{if(localStorage.getItem('healthreport_sidebar')==='open'&&window.innerWidth>768&&document.body){document.body.classList.add('sidebar-open');}}catch(_){}})();</script>
</head>
<body>

<!-- ログインオーバーレイ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🍱 食事記録</h2>
    <p>パスワードを入力してください</p>
    <input class="login-input" type="password" id="passwordInput" />
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- メインUI -->
<div class="header">
  <div class="header-title">🍱 食事記録アシスタント</div>
  <div class="header-nav" id="headerNav"></div>
</div>

<!-- ダッシュボードバー -->
<div class="dashboard" id="dashboard" style="display:none">
  <button class="dash-toggle-row" id="dashToggleBtn" onclick="toggleDashboard()"
    aria-expanded="true" aria-controls="dashBody">
    <span class="dash-date" id="dashDate"></span>
    <span class="dash-compact" id="dashCompact"></span>
    <span class="dash-arrow" id="dashArrow">▾</span>
  </button>
  <div class="dash-body" id="dashBody">
    <div class="dash-cal-row">
      <span class="dash-cal-text" id="dashCalText"></span>
      <div class="dash-bar-wrap"><div class="dash-bar" id="dashBar" style="width:0%"></div></div>
      <span class="dash-pct" id="dashPct"></span>
    </div>
    <div class="dash-meta-row" id="dashMeta"></div>
    <div class="dash-meals-row" id="dashMeals"></div>
    <div class="bmi-widget" id="bmiWidget" aria-label="BMI・基礎代謝情報" hidden>
      <span class="bmi-lbl">BMI</span>
      <span id="bmiValue" class="bmi-val">—</span>
      <span id="bmiStatus"></span>
      <span class="bmi-sep">｜</span>
      <span class="bmi-lbl">基礎代謝</span>
      <span id="bmrValue" class="bmi-val">—</span>
      <span class="bmi-lbl">kcal/日</span>
      <span id="bmrNote" style="font-size:11px;color:var(--text-secondary)"></span>
      <span id="bmiHint" class="bmi-hint"></span>
    </div>
  </div>
</div>

<!-- クイックパレット -->
<div class="quick-palette" id="quickPalette" style="display:none">
  <div class="qp-chips" id="qpChips"></div>
</div>

<div class="messages" id="messages">
  <div class="message ai">
    <div class="bubble" id="greetingBubble"></div>
  </div>
</div>

<div class="image-preview" id="imagePreview"></div>

<div class="input-area">
  <button class="attach-btn" onclick="document.getElementById('fileInput').click()" aria-label="画像を添付">📎</button>
  <input type="file" id="fileInput" accept="image/*" multiple hidden />
  <textarea class="text-input" id="textInput" placeholder="メッセージを入力…" rows="1"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送信">↑</button>
</div>

<!-- 体重クイック入力モーダル -->
<div class="qp-modal" id="weightModal" style="display:none" onclick="if(event.target===this)closeWeightModal()">
  <div class="qp-modal-box">
    <div class="qp-modal-title">⚖️ 体重を記録</div>
    <div class="qp-modal-row">
      <label>時間帯</label>
      <select id="weightTimeOfDay">
        <option value="朝">朝</option>
        <option value="夜">夜</option>
      </select>
    </div>
    <div class="qp-modal-row">
      <label>体重</label>
      <input type="number" id="weightValue" step="0.1" min="20" max="300" placeholder="70.5" />
      <span style="font-size:14px;color:var(--text-secondary);flex-shrink:0;margin-left:4px">kg</span>
    </div>
    <div class="qp-modal-actions">
      <button class="cancel" onclick="closeWeightModal()">キャンセル</button>
      <button class="submit" onclick="submitQuickWeight()">記録する</button>
    </div>
  </div>
</div>

<!-- 歩数クイック入力モーダル -->
<div class="qp-modal" id="stepsModal" style="display:none" onclick="if(event.target===this)closeStepsModal()">
  <div class="qp-modal-box">
    <div class="qp-modal-title">👟 歩数を記録</div>
    <div class="qp-modal-row">
      <label>歩数</label>
      <input type="number" id="stepsValue" step="100" min="0" max="100000" placeholder="8000" />
      <span style="font-size:14px;color:var(--text-secondary);flex-shrink:0;margin-left:4px">歩</span>
    </div>
    <div class="qp-modal-actions">
      <button class="cancel" onclick="closeStepsModal()">キャンセル</button>
      <button class="submit" onclick="submitQuickSteps()">記録する</button>
    </div>
  </div>
</div>

<script src="/static/common.js"></script>
<script>
// ── 設定 ─────────────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

// ナビバー初期化
initNav('chat');
initTheme();

// ── オンボーディング挨拶文 ────────────────────────────────────────────────────
function getGreetingHtml(name) {
  var greeting = name
    ? 'こんにちは、' + escHtml(name) + 'さん！😊<br>'
    : 'こんにちは！😊<br>';
  return greeting
    + '食事・体重・歩数を自然な言葉で記録できます。<br><br>'
    + '<b>💡 入力例:</b><br>'
    + '・「朝食にトーストとコーヒー」<br>'
    + '・「体重 65.2kg」<br>'
    + '・「今日は8000歩歩いた」<br><br>'
    + '📎 画像を添付すると食品を認識します<br>'
    + '⬇️ 下のパレットからワンタップ入力も可能です';
}

// ── 状態 ─────────────────────────────────────────────────────────────────────
const chatState = {
  pendingImages: [], // { base64: string, previewUrl: string }
  isStreaming: false,
  dashExpanded: true,
  renderTimer: null,  // SSEデバウンス用（Step 8で使用）
  reader: null,       // fetch SSE ストリームのReader（beforeunloadでcancel）
};

// ── ダッシュボード ────────────────────────────────────────────────────────────
const MEAL_TYPES = [
  { key: 'breakfast', label: '朝食' },
  { key: 'lunch',     label: '昼食' },
  { key: 'dinner',    label: '夕食' },
  { key: 'snack',     label: '間食' },
];
const WEEKDAYS = ['日','月','火','水','木','金','土'];

async function loadBmi() {
  var widget = document.getElementById('bmiWidget');
  try {
    var res = await fetch('/api/bmi');
    if (!res.ok) {
      if (res.status === 404) {
        var err = await res.json().catch(function() { return {}; });
        var hint = document.getElementById('bmiHint');
        if (err.detail === 'no_weight_record') {
          hint.textContent = '体重を記録するとBMIが表示されます';
        } else if (err.detail === 'height_not_configured') {
          hint.textContent = '設定画面で身長を入力してください';
        }
        widget.removeAttribute('hidden');
      }
      return;
    }
    var data = await res.json();
    document.getElementById('bmiValue').textContent = data.bmi;
    var statusEl = document.getElementById('bmiStatus');
    statusEl.textContent = data.bmi_status;
    var statusColors = {
      '低体重': '#60a5fa', '普通体重': '#34d399',
      '肥満(1度)': '#fbbf24', '肥満(2度)': '#f97316',
      '肥満(3度)': '#f87171', '肥満(4度)': '#dc2626'
    };
    statusEl.style.color = statusColors[data.bmi_status] || '';
    document.getElementById('bmrValue').textContent = data.bmr_kcal;
    document.getElementById('bmrNote').textContent = data.bmr_note || '';
    document.getElementById('bmiHint').textContent = '';
    widget.removeAttribute('hidden');
  } catch (e) { console.error('BMI読込エラー:', e); }
}

async function refreshDashboard() {
  try {
    const [todayRes, settRes] = await Promise.all([
      fetch('/api/today'),
      fetch('/api/settings'),
    ]);
    if (!todayRes.ok || !settRes.ok) { console.error('dashboard API error:', todayRes.status, settRes.status); return; }
    const todayData = await todayRes.json();
    const settings = await settRes.json();
    updateDashboard(todayData, settings);
    loadQuickPalette();
    loadBmi();
  } catch (e) { console.error('dashboard更新エラー:', e); }
}

function updateDashboard(data, settings) {
  const goal = parseInt(settings.daily_calorie_goal) || 1800;
  const cal = data.totals ? data.totals.calories : 0;
  const pct = goal > 0 ? Math.min(Math.round(cal / goal * 100), 100) : 0;
  const over = cal > goal;

  // 日付ラベル
  const d = new Date(data.date + 'T00:00:00');
  const dateLabel = (d.getMonth() + 1) + '/' + d.getDate() + '（' + WEEKDAYS[d.getDay()] + '）';
  document.getElementById('dashDate').textContent = '今日 ' + dateLabel;

  // カロリー行
  document.getElementById('dashCalText').textContent = '🔥 ' + cal + ' / ' + goal + ' kcal';
  const bar = document.getElementById('dashBar');
  bar.style.width = pct + '%';
  bar.className = 'dash-bar' + (over ? ' over' : '');
  document.getElementById('dashPct').textContent = pct + '%';

  // 体重・歩数行
  const metaItems = [];
  const w = data.weight || {};
  if (w.morning != null) metaItems.push('⚖️ 朝 ' + w.morning + 'kg');
  if (w.evening != null) metaItems.push('⚖️ 夜 ' + w.evening + 'kg');
  if (data.steps != null) metaItems.push('👟 ' + data.steps.toLocaleString() + '歩');
  document.getElementById('dashMeta').innerHTML = metaItems.map(function(t) {
    return '<span class="dash-meta-item">' + t + '</span>';
  }).join('');

  // 食事区分行
  const SKIP_ELIGIBLE = new Set(['breakfast', 'lunch', 'dinner']);
  const recordedTypes = new Set((data.meals || []).map(function(m) { return m.meal_type; }));
  const skippedTypes = new Set(data.skipped_meal_types || []);
  document.getElementById('dashMeals').innerHTML = MEAL_TYPES.map(function(mt) {
    const done = recordedTypes.has(mt.key);
    const skipped = SKIP_ELIGIBLE.has(mt.key) && skippedTypes.has(mt.key) && !done;
    const canSkip = SKIP_ELIGIBLE.has(mt.key) && !done && !skipped;
    if (done) {
      return '<span class="dash-meal-chip">' + mt.label + '✅</span>';
    }
    if (skipped) {
      return '<span class="dash-meal-chip">' + mt.label
        + '<span class="skip-badge"> 食べなかった✓</span>'
        + '<button class="skip-undo-btn" data-meal-type="' + escHtml(mt.key) + '" data-meal-date="' + escHtml(data.date) + '" aria-label="' + escHtml(mt.label) + 'スキップを取り消す">取り消す</button>'
        + '</span>';
    }
    if (canSkip) {
      return '<span class="dash-meal-chip">' + mt.label + '⬜'
        + '<button class="skip-btn" data-meal-type="' + escHtml(mt.key) + '" data-meal-date="' + escHtml(data.date) + '" aria-label="' + escHtml(mt.label) + 'を食べなかったと記録">食べなかった</button>'
        + '</span>';
    }
    return '<span class="dash-meal-chip">' + mt.label + '⬜</span>';
  }).join('');
  // スキップボタンのイベント登録
  document.querySelectorAll('.skip-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { recordSkip(this.dataset.mealType, this.dataset.mealDate); });
  });
  document.querySelectorAll('.skip-undo-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { removeSkip(this.dataset.mealType, this.dataset.mealDate); });
  });

  // コンパクト表示テキスト
  const compactParts = ['🔥 ' + cal + '/' + goal + 'kcal'];
  if (w.morning != null) compactParts.push('⚖️' + w.morning);
  if (w.evening != null && w.morning == null) compactParts.push('⚖️' + w.evening);
  if (data.steps != null) compactParts.push('👟' + data.steps.toLocaleString());
  document.getElementById('dashCompact').textContent = compactParts.join('  ');

  // 表示
  document.getElementById('dashboard').style.display = 'block';
  applyDashState();
}

function toggleDashboard() {
  chatState.dashExpanded = !chatState.dashExpanded;
  applyDashState();
}

function applyDashState() {
  const body = document.getElementById('dashBody');
  const arrow = document.getElementById('dashArrow');
  const compact = document.getElementById('dashCompact');
  const date = document.getElementById('dashDate');
  const btn = document.getElementById('dashToggleBtn');
  if (chatState.dashExpanded) {
    body.style.display = 'block';
    arrow.textContent = '▾';
    compact.style.display = 'none';
    date.style.display = 'inline';
    if (btn) btn.setAttribute('aria-expanded', 'true');
  } else {
    body.style.display = 'none';
    arrow.textContent = '▸';
    compact.style.display = 'inline';
    date.style.display = 'none';
    if (btn) btn.setAttribute('aria-expanded', 'false');
  }
}

async function loadChatHistory() {
  try {
    const [meRes, histRes] = await Promise.all([
      fetch('/api/settings'),
      fetch('/api/chat/messages'),
    ]);
    // ユーザー名入りの挨拶文を更新
    if (meRes.ok) {
      const s = await meRes.json();
      const name = s.user_name && s.user_name !== 'DefaultName' ? s.user_name : null;
      const el = document.getElementById('greetingBubble');
      if (el && name) {
        el.innerHTML = getGreetingHtml(name);
      }
    }
    if (!histRes.ok) return;
    const messages = await histRes.json();
    if (!messages.length) return;

    // 既存の挨拶バブルを削除して履歴を表示
    const greetingMsg = document.getElementById('greetingBubble')?.closest('.message');
    if (greetingMsg) greetingMsg.remove();

    const wrap = document.getElementById('messages');

    // 「以前の会話」区切り線
    const sep = document.createElement('div');
    sep.style.cssText = 'text-align:center;color:var(--text-secondary);font-size:12px;padding:8px 0 4px;';
    sep.textContent = '─── 以前の会話 ───';
    wrap.appendChild(sep);

    for (const msg of messages) {
      if (msg.role === 'user') {
        // 画像は省略してプレースホルダー表示
        addUserMessage(msg.text, [], msg.has_image);
      } else if (msg.role === 'assistant' && msg.text) {
        const { textEl } = createAiMessage();
        textEl.innerHTML = DOMPurify.sanitize(marked.parse(msg.text));
      }
    }

    // 新しい会話との区切り線
    const sep2 = document.createElement('div');
    sep2.style.cssText = 'text-align:center;color:var(--text-secondary);font-size:12px;padding:4px 0 8px;';
    sep2.textContent = '─── ここから新しいメッセージ ───';
    wrap.appendChild(sep2);

    scrollBottom();
  } catch (e) { console.error('チャット履歴読み込みエラー:', e); }
}

// ── 画像添付 ──────────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', async (e) => {
  for (const file of e.target.files) {
    const base64 = await fileToBase64(file);
    const previewUrl = URL.createObjectURL(file);
    const idx = chatState.pendingImages.length;
    chatState.pendingImages.push({ base64, previewUrl });
    addPreviewItem(idx, previewUrl);
  }
  e.target.value = '';
});

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function addPreviewItem(idx, previewUrl) {
  const wrap = document.getElementById('imagePreview');
  const div = document.createElement('div');
  div.className = 'preview-item';
  div.dataset.idx = idx;
  div.innerHTML = `
    <img src="${previewUrl}" alt="添付画像">
    <button class="remove" onclick="removePreview(${idx})">×</button>`;
  wrap.appendChild(div);
  wrap.classList.add('has-items');
}

function removePreview(idx) {
  chatState.pendingImages[idx] = null;
  const el = document.querySelector(`.preview-item[data-idx="${idx}"]`);
  if (el) el.remove();
  if (!document.querySelector('.preview-item')) {
    document.getElementById('imagePreview').classList.remove('has-items');

// ── テキストエリア自動リサイズ ────────────────────────────────────────────────
const textInput = document.getElementById('textInput');
textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
});
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── メッセージ送信 ────────────────────────────────────────────────────────────
async function sendMessage() {
  if (chatState.isStreaming) return;

  const text = textInput.value.trim();
  const images = chatState.pendingImages.filter(Boolean).map(i => i.base64);
  if (!text && images.length === 0) return;

  // 入力クリア
  textInput.value = '';
  textInput.style.height = 'auto';
  chatState.pendingImages = [];
  document.getElementById('imagePreview').innerHTML = '';
  document.getElementById('imagePreview').classList.remove('has-items');

  addUserMessage(text, images);

  const typingEl = addTyping();
  chatState.isStreaming = true;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner-sm"></span>';

  let aiMsgEl = null;
  let aiTextEl = null;
  let currentText = '';

  // SSE 描画デバウンス（16ms）: 高頻度チャンクのDOM更新をまとめて処理
  function scheduleRender() {
    if (chatState.renderTimer) clearTimeout(chatState.renderTimer);
    chatState.renderTimer = setTimeout(function() {
      if (aiTextEl) {
        aiTextEl.innerHTML = DOMPurify.sanitize(marked.parse(currentText));
        scrollBottom();
      }
      chatState.renderTimer = null;
    }, 16);
  }

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, images }),
    });

    if (!resp.ok) {
      typingEl.remove();
      appendError(resp.status === 401 ? 'セッション切れです。再ログインしてください。' : 'サーバーエラーが発生しました。');
      return;
    }

    const reader = resp.body.getReader();
    chatState.reader = reader;
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      let newlineIdx;
      while ((newlineIdx = buf.indexOf('\n\n')) !== -1) {
        const chunk = buf.slice(0, newlineIdx).trim();
        buf = buf.slice(newlineIdx + 2);

        if (!chunk.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(chunk.slice(6)); } catch { continue; }

        if (data.type === 'text') {
          if (!aiMsgEl) {
            typingEl.remove();
            const r = createAiMessage();
            aiMsgEl = r.msgEl;
            aiTextEl = r.textEl;
          }
          currentText += data.content;
          scheduleRender();

        } else if (data.type === 'choices') {
          // 選択肢ボタンを表示
          if (!aiMsgEl) {
            if (typingEl.parentElement) typingEl.remove();
            const r = createAiMessage('');
            aiMsgEl = r.msgEl;
            aiTextEl = r.textEl;
          }
          showChoiceButtons(aiMsgEl, data.question, data.options);
          scrollBottom();

        } else if (data.type === 'record_done') {
          // meal_skipは取り消しUI不要（ダッシュボードから直接操作可能）
          if (data.record_type !== 'meal_skip' && aiMsgEl) {
            addUndoButton(aiMsgEl, data.record_type, data.record_id);
          }
          // スキップ記録・削除後もダッシュボードを更新
          if (data.record_type === 'meal_skip') {
            refreshDashboard();
          }

        } else if (data.type === 'done') {
          // デバウンス中の描画を即時フラッシュ
          if (chatState.renderTimer) {
            clearTimeout(chatState.renderTimer);
            chatState.renderTimer = null;
            if (aiTextEl) {
              aiTextEl.innerHTML = DOMPurify.sanitize(marked.parse(currentText));
              scrollBottom();
            }
          }
          if (typingEl.parentElement) typingEl.remove();
          break;

        } else if (data.type === 'error') {
          if (typingEl.parentElement) typingEl.remove();
          appendError(data.message);
        }
      }
    }

  } catch (e) {
    console.error(e);
    if (typingEl.parentElement) typingEl.remove();
    appendError('通信エラーが発生しました。');
  } finally {
    chatState.isStreaming = false;
    chatState.reader = null;
    const btn = document.getElementById('sendBtn');
    btn.disabled = false;
    btn.textContent = '↑';
    textInput.focus();
    refreshDashboard();
  }
}

// ── UI ヘルパー ────────────────────────────────────────────────────────────────
function addUserMessage(text, images, hasImagePlaceholder = false) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message user';
  let inner = '';
  images.forEach(b64 => {
    inner += `<img class="user-image" src="data:image/jpeg;base64,${b64}" alt="添付画像">`;
  });
  if (hasImagePlaceholder && images.length === 0) {
    inner += `<span style="opacity:0.7;font-size:14px">📷 画像</span>`;
    if (text) inner += '<br>';
  }
  if (text) inner += escHtml(text).replace(/\n/g, '<br>');
  div.innerHTML = `<div class="bubble">${inner}</div>`;
  wrap.appendChild(div);
  scrollBottom();
}

function createAiMessage() {
  const wrap = document.getElementById('messages');
  const msgEl = document.createElement('div');
  msgEl.className = 'message ai';
  const textEl = document.createElement('div');
  textEl.className = 'bubble';
  msgEl.appendChild(textEl);
  wrap.appendChild(msgEl);
  scrollBottom();
  return { msgEl, textEl };
}

function addTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.innerHTML = `
    <div class="bubble">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>`;
  wrap.appendChild(div);
  scrollBottom();
  return div;
}

// ── 選択肢ボタン ─────────────────────────────────────────────────────────────
function showChoiceButtons(parentEl, question, options) {
  const wrap = document.createElement('div');
  wrap.className = 'choices';

  if (question) {
    const q = document.createElement('div');
    q.className = 'choices-question';
    q.textContent = question;
    wrap.appendChild(q);
  }

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (opt.value === '該当なし' ? ' no-match' : '');
    btn.textContent = opt.label;
    btn.onclick = () => {
      // ボタンを非活性化（二重送信防止）
      wrap.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      wrap.style.opacity = '0.5';
      // 選択値をテキスト入力にセットして送信
      document.getElementById('textInput').value = opt.value;
      sendMessage();
    };
    wrap.appendChild(btn);
  });

  parentEl.appendChild(wrap);
}

function appendError(msg) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = '⚠️ ' + msg;
  wrap.appendChild(div);
  scrollBottom();
}

// ── 取り消しボタン ────────────────────────────────────────────────────────────
function addUndoButton(msgEl, recordType, recordId) {
  const bubble = msgEl.querySelector('.bubble');
  if (!bubble) return;
  const btn = document.createElement('button');
  btn.className = 'undo-btn';
  btn.textContent = '↩ 取り消し';
  btn.onclick = function() { undoRecord(recordType, recordId, btn); };
  bubble.appendChild(document.createElement('br'));
  bubble.appendChild(btn);
  scrollBottom();
  // 30秒後にフェードアウト
  setTimeout(function() {
    btn.classList.add('fading');
    setTimeout(function() { btn.remove(); }, 600);
  }, 30000);
}

async function undoRecord(recordType, recordId, btn) {
  btn.disabled = true;
  btn.textContent = '取り消し中...';
  const pathMap = { meal: 'meals', weight: 'weight', steps: 'steps' };
  const path = pathMap[recordType];
  if (!path) return;
  try {
    const res = await fetch('/api/' + path + '/' + recordId, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    btn.textContent = '取り消しました';
    btn.style.color = '#8e8e93';
    btn.style.cursor = 'default';
    btn.onclick = null;
    refreshDashboard();
    setTimeout(function() {
      btn.classList.add('fading');
      setTimeout(function() { btn.remove(); }, 600);
    }, 2000);
  } catch(e) {
    console.error('取り消しエラー:', e);
    btn.textContent = '取り消し失敗';
    btn.disabled = false;
  }
}

async function recordSkip(mealType, mealDate) {
  const btn = document.querySelector('.skip-btn[data-meal-type="' + mealType + '"][data-meal-date="' + mealDate + '"]');
  if (btn) btn.disabled = true;
  try {
    const res = await fetch('/api/meal-skips', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({meal_date: mealDate, meal_type: mealType}),
    });
    if (res.ok) {
      refreshDashboard();
    } else {
      if (btn) btn.disabled = false;
      showToast('スキップの記録に失敗しました', 'error');
    }
  } catch (e) {
    if (btn) btn.disabled = false;
    showToast('通信エラーが発生しました', 'error');
  }
}

async function removeSkip(mealType, mealDate) {
  const btn = document.querySelector('.skip-undo-btn[data-meal-type="' + mealType + '"][data-meal-date="' + mealDate + '"]');
  if (btn) btn.disabled = true;
  try {
    const res = await fetch('/api/meal-skips', {
      method: 'DELETE',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({meal_date: mealDate, meal_type: mealType}),
    });
    if (res.ok) {
      refreshDashboard();
    } else {
      if (btn) btn.disabled = false;
      showToast('スキップの取り消しに失敗しました', 'error');
    }
  } catch (e) {
    if (btn) btn.disabled = false;
    showToast('通信エラーが発生しました', 'error');
  }
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' toast-error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, type === 'error' ? 5000 : 3000);
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ── クイックパレット ──────────────────────────────────────────────────────────
async function loadQuickPalette() {
  try {
    const res = await fetch('/api/quick-entries');
    if (!res.ok) return;
    const data = await res.json();
    const chips = document.getElementById('qpChips');
    const palette = document.getElementById('quickPalette');
    let html = '<button class="qp-chip action" data-action="weight">⚖️ 体重</button>';
    html += '<button class="qp-chip action" data-action="steps">👟 歩数</button>';
    ['朝食', '昼食', '夕食', '間食'].forEach(function(m) {
      html += '<button class="qp-chip meal" data-action="quick" data-text="' + m + '">' + m + '</button>';
    });
    for (const f of (data.favorites || [])) {
      const attr = escHtml(f.keyword);
      html += '<button class="qp-chip fav" data-action="quick" data-text="' + attr + '">★ ' + attr + '</button>';
    }
    chips.innerHTML = html;
    palette.style.display = 'block';
  } catch (e) { console.error('クイックパレット読み込みエラー:', e); }
}

function sendQuick(el) {
  const val = el.dataset.text;
  const inp = document.getElementById('textInput');
  const cur = inp.value.trimEnd();
  inp.value = cur ? cur + '、' + val : val;
  inp.dispatchEvent(new Event('input'));
  showToast(val + ' を入力しました');
}

// ── 体重クイック入力 ──────────────────────────────────────────────────────────
function openWeightModal() {
  document.getElementById('weightValue').value = '';
  document.getElementById('weightModal').style.display = 'flex';
  setTimeout(function() { document.getElementById('weightValue').focus(); }, 100);
}

function closeWeightModal() {
  document.getElementById('weightModal').style.display = 'none';
}

function submitQuickWeight() {
  const val = parseFloat(document.getElementById('weightValue').value);
  if (!val || val < 20 || val > 300) { return; }
  const tod = document.getElementById('weightTimeOfDay').value;
  closeWeightModal();
  document.getElementById('textInput').value = tod + 'の体重 ' + val + 'kg';
  sendMessage();
}

// ── 歩数クイック入力 ──────────────────────────────────────────────────────────
function openStepsModal() {
  document.getElementById('stepsValue').value = '';
  document.getElementById('stepsModal').style.display = 'flex';
  setTimeout(function() { document.getElementById('stepsValue').focus(); }, 100);
}

function closeStepsModal() {
  document.getElementById('stepsModal').style.display = 'none';
}

function submitQuickSteps() {
  const val = parseInt(document.getElementById('stepsValue').value);
  if (!val || val < 0 || val > 100000) { return; }
  closeStepsModal();
  document.getElementById('textInput').value = '今日の歩数 ' + val + '歩';
  sendMessage();
}

// ── パスワード入力でEnter ────────────────────────────────────────────────────
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── クイックパレット クリック委譲（1回だけ登録）──────────────────────────────
document.getElementById('qpChips').addEventListener('click', function(e) {
  const btn = e.target.closest('.qp-chip');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'weight') openWeightModal();
  else if (action === 'steps') openStepsModal();
  else if (action === 'quick') sendQuick(btn);
});

// ── 初期化 ────────────────────────────────────────────────────────────────────
// 挨拶バブルを初期表示（loadChatHistory() でユーザー名入りに上書きされる）
document.getElementById('greetingBubble').innerHTML = getGreetingHtml(null);
checkAuth();

window.addEventListener('beforeunload', function() {
  if (chatState.renderTimer) clearTimeout(chatState.renderTimer);
  if (chatState.reader) chatState.reader.cancel();
});
</script>
